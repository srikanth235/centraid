<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Centraid — Centraid documentation">
<defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#0e1230"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.18" r="0.85">
      <stop offset="0" stop-color="#3EC8B4" stop-opacity="0.55"/>
      <stop offset="0.35" stop-color="#3EC8B4" stop-opacity="0.18"/>
      <stop offset="0.7" stop-color="#3EC8B4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.05" cy="0.95" r="0.6">
      <stop offset="0" stop-color="#2AA593" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#2AA593" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#ffffff" fill-opacity="0.045"/>
    </pattern>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3EC8B4"/>
      <stop offset="0.6" stop-color="#7FE0D2"/>
      <stop offset="1" stop-color="#3EC8B4" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="markGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3EC8B4"/>
      <stop offset="1" stop-color="#7FE0D2"/>
    </linearGradient>
    <symbol id="mark" viewBox="0 0 64 64" overflow="visible">
      <rect x="6" y="6" width="52" height="52" rx="14" fill="url(#markGrad)"/>
      <g transform="translate(14 14) scale(0.15)">
        <circle cx="120" cy="120" r="80" fill="none" stroke="#ffffff" stroke-width="8"/>
        <circle cx="120" cy="40" r="14" fill="#ffffff"/>
        <circle cx="189.28" cy="160" r="14" fill="#ffffff"/>
        <circle cx="50.72" cy="160" r="14" fill="#ffffff"/>
        <circle cx="120" cy="120" r="21" fill="#ffffff"/>
      </g>
    </symbol>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#bar)"/>

  <g transform="translate(78 78)">
