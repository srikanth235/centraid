    <text x="36" y="17" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" font-weight="700" fill="#B8ECE4" letter-spacing="0.18em">DOCS.CENTRAID.DEV</text>
  </g>

  <g transform="translate(940 56)">
    <use href="#mark" width="200" height="200"/>
  </g>

  <text x="78" y="192" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20" font-weight="700" fill="#7FE0D2" letter-spacing="0.18em">PERSONAL APP BUILDER</text>

  <text x="78" y="293" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="96" font-weight="800" fill="#ffffff" letter-spacing="-2.5">Centraid</text>

  <text x="78" y="362" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="#a8aebd" letter-spacing="-0.2">Build, share, and run private apps from a desktop shell and matching mobile</text>
  <text x="78" y="390" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="#a8aebd" letter-spacing="-0.2">companion.</text>

  <g transform="translate(78 524)">
