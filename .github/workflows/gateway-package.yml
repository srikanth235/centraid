# Path-filtered packaging CI (issue #504 Phase G).
# External observer smoke — no product-main "is smoke" branches.
name: gateway-package

on:
  pull_request:
    paths:
      - 'packages/gateway/**'
      - 'packages/app-engine/**'
      - 'packages/protocol/**'
      - 'packages/cli/**'
      - 'Dockerfile'
      - 'flake.nix'
      - 'scripts/gateway-package/**'
  push:
    branches: [main]
    paths:
      - 'packages/gateway/**'
      - 'packages/app-engine/**'
      - 'packages/protocol/**'
      - 'Dockerfile'
      - 'scripts/gateway-package/**'
  workflow_dispatch:

jobs:
  trace-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install
        run: bun install --frozen-lockfile
      - name: Build protocol + gateway (minimal)
        run: |
          bun run --cwd packages/protocol build
          bun run --cwd packages/blob-format build
          bun run --cwd packages/app-engine build
          bun run --cwd packages/gateway build
      - name: Trace install set
        run: node scripts/gateway-package/trace.mjs --out=artifacts/gateway-package-trace.json
      - name: Install smoke
        run: node scripts/gateway-package/smoke.mjs --gateway-bin packages/gateway/dist/cli/cli.js --port 18787
      - name: Upload trace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gateway-package-trace
          path: artifacts/gateway-package-trace.json
          if-no-files-found: ignore
