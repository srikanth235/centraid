name: pairing-relay-e2e

# tests/agent-e2e-pairing/flows/cross-network-relay.mjs — the device-pairing
# ceremony (issue #289) forced over the REAL iroh relay/hole-punch path: the
# gateway daemon and the device identity run in separate Docker containers
# on separate, non-interconnected bridge networks, so @centraid/tunnel can't
# take a loopback shortcut the way the other two flows in this tier do. It's
# network-dependent (needs internet egress to n0's relay infrastructure) and
# heavier than the unit `ci` job, so it runs nightly + on-demand like
# `e2e.yml`, not on every PR.
on:
  schedule:
    - cron: '30 6 * * *' # 06:30 UTC nightly (offset from e2e.yml's 06:00 so they don't contend)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pairing-relay-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      # Unlike ci.yml/e2e.yml — which only ever invoke `bun`/`bunx` and so
      # never depend on the runner's own system Node — this workflow's last
      # step below runs the flow script with a bare `node`, and that script
      # loads @centraid/tunnel's native (napi) addon, whose package declares
      # `"engines": {"node": ">=22.5"}` (packages/tunnel/package.json).
      # Pin the interpreter explicitly rather than trust whatever Node
      # ubuntu-latest happens to ship preinstalled.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - run: bun install --frozen-lockfile
      # GitHub-hosted ubuntu-latest runners ship Docker preinstalled and
      # already running (no `docker context`/daemon setup needed) — this
      # step fails fast with a clear message if that ever stops being true,
      # instead of the flow's own docker commands failing more confusingly
      # later.
      - run: docker info
      # Scoped to what this flow actually runs; turbo's `dependsOn:
      # ["^build"]` (turbo.json) pulls the full workspace dependency graph
      # each package needs at runtime, same as the other two flows in this
      # tier (see tests/agent-e2e-pairing/lib/harness.mjs's ensureBuilt).
      - run: bunx turbo run build --filter=@centraid/gateway --filter=@centraid/tunnel
      # Production must never silently fall back to the JS byte pump.
      - run: test -f packages/tunnel/native/centraid-tunnel-native.linux-x64.node
      # The flow's own harness (lib/docker-harness.mjs) additionally fetches
      # @number0/iroh's LINUX native addon package if it's missing — the
      # `bun install` above ran on this same amd64 runner, so on
      # ubuntu-latest that's already satisfied and it's a no-op; documented
      # here because it is NOT a no-op on Apple Silicon + OrbStack, where
      # local runs of this flow actually need it.
      - run: node tests/agent-e2e-pairing/flows/cross-network-relay.mjs
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: failure()
        with:
          name: pairing-relay-e2e-run
          path: tests/agent-e2e-pairing/runs/
          retention-days: 7
