name: pairing-relay-e2e

# The three pairing journeys run as independent jobs so one failure cannot
# prevent the other two from producing evidence. The final job merges their
# artifacts into the stable bundle consumed by the 06:00 health report.
on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  lifecycle:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - run: bun install --frozen-lockfile
      - run: docker info
      - run: bunx turbo run build --filter=@centraid/gateway --filter=@centraid/tunnel
      - run: node scripts/test-report/prepare.mjs
      - run: node tests/agent-e2e-pairing/flows/device-pairing-lifecycle.mjs
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: pairing-evidence-lifecycle
          path: |
            artifacts/
            tests/agent-e2e-pairing/runs/
          retention-days: 7

  ticket-hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - run: bun install --frozen-lockfile
      - run: docker info
      - run: bunx turbo run build --filter=@centraid/gateway --filter=@centraid/tunnel
      - run: node scripts/test-report/prepare.mjs
      - run: node tests/agent-e2e-pairing/flows/pairing-ticket-hygiene.mjs
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: pairing-evidence-ticket-hygiene
          path: |
            artifacts/
            tests/agent-e2e-pairing/runs/
          retention-days: 7

  cross-network-relay:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - run: bun install --frozen-lockfile
      - run: docker info
      - run: bunx turbo run build --filter=@centraid/gateway --filter=@centraid/tunnel
      - run: node scripts/test-report/prepare.mjs
      # The Docker harness fetches the Linux iroh native addon when a local
      # Apple-Silicon install did not place it in this amd64 runner's tree.
      - run: node tests/agent-e2e-pairing/flows/cross-network-relay.mjs
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: pairing-evidence-cross-network-relay
          path: |
            artifacts/
            tests/agent-e2e-pairing/runs/
          retention-days: 7

  pairing-report:
    needs: [lifecycle, ticket-hygiene, cross-network-relay]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          pattern: pairing-evidence-*
          path: .
          merge-multiple: true
      - run: node scripts/test-report/generate.mjs
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: nightly-evidence-pairing
          path: |
            tests/agent-e2e-pairing/runs/
            artifacts/
            dist/test-report/
          retention-days: 7
