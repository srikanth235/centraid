name: oauth-worker

# #526 — stateless Centraid Assist ceremony edge. Verification always runs.
# Production deploy is additionally gated by the protected environment and an
# explicit repository variable; Google/Cloudflare release evidence remains a
# human operator gate documented under docs/release.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/oauth-worker/**'
      - 'packages/gateway/src/serve/assist-oauth.ts'
      - '.github/workflows/oauth-worker.yml'
      - 'package.json'
      - 'bun.lock'
  pull_request:
    paths:
      - 'apps/oauth-worker/**'
      - 'packages/gateway/src/serve/assist-oauth.ts'
      - '.github/workflows/oauth-worker.yml'
      - 'package.json'
      - 'bun.lock'

permissions:
  contents: read

concurrency:
  group: oauth-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run --cwd apps/oauth-worker typecheck
      - run: bun run --cwd apps/oauth-worker test
      - run: bun run --cwd apps/oauth-worker build

  deploy:
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.OAUTH_WORKER_DEPLOY_ENABLED == 'true'
    needs: [verify]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: oauth-production
      url: https://oauth.centraid.dev
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - name: Deploy protected production Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run --cwd apps/oauth-worker deploy
