name: web

# #501 — continuous public PWA (app.centraid.dev) CI gate + optional deploy.
# Gateway-embedded shell remains primary for LAN/ticket path.
# Deploy step runs only when CLOUDFLARE_API_TOKEN is present.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/client/**'
      - 'packages/design-tokens/**'
      - '.github/workflows/web.yml'
      - 'package.json'
      - 'bun.lock'
  pull_request:
    paths:
      - 'apps/web/**'
      - 'packages/client/**'
      - 'packages/design-tokens/**'
      - '.github/workflows/web.yml'
      - 'package.json'
      - 'bun.lock'

permissions:
  contents: read

concurrency:
  group: web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run web:build
      - run: bun run web:smoke
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: web-dist
          path: apps/web/dist/
          retention-days: 7

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run web:build
      - name: Deploy to Cloudflare (when token present)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: apps/web
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "CLOUDFLARE_API_TOKEN absent — skip deploy (scaffold). Bind app.centraid.dev in CF when ready."
            exit 0
          fi
          bunx wrangler deploy --config wrangler.json
