name: Companion e2e

on:
  pull_request:
    paths:
      - 'apps/extension/**'
      - 'apps/web/iroh-wasm/**'
      - 'apps/web/src/generated/**'
      - 'packages/app-engine/**'
      - 'packages/blueprints/apps/locker/**'
      - 'packages/gateway/**'
      - 'packages/tunnel/**'
      - 'packages/vault/**'
      - 'tests/agent-e2e-pairing/**'
      - '.github/workflows/extension-e2e.yml'
  schedule:
    - cron: '45 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  companion:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
        working-directory: apps/extension
      - run: bunx turbo run build --filter=@centraid/gateway --filter=@centraid/tunnel --filter=@centraid/extension
      - run: xvfb-run --auto-servernum node tests/agent-e2e-pairing/flows/extension-companion.mjs
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: failure()
        with:
          name: companion-e2e-run
          path: tests/agent-e2e-pairing/runs/
          retention-days: 7
