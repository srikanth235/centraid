# Android assembleDebug smoke (issue #468 J8).
# Path-filtered so mobile-only PRs still get a native compile signal without
# loading the full monorepo verify job.

name: mobile-android

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-android.yml'
  pull_request:
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-android.yml'
  workflow_dispatch:

concurrency:
  group: mobile-android-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  assemble-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13

      - name: Cache Bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4.7.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2

      - run: bun install --frozen-lockfile

      - name: Assemble debug APK
        working-directory: apps/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon
