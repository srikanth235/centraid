name: mobile-android

# J8 / #501 — path-filtered assembleDebug. Not a store release path.
# Nightly full Maestro Android remains in e2e.yml.

on:
  pull_request:
    paths:
      - 'apps/mobile/android/**'
      - 'apps/mobile/app.config.ts'
      - 'apps/mobile/package.json'
      - 'apps/mobile/modules/**'
      - 'apps/mobile/plugins/**'
      - '.github/workflows/mobile-android.yml'
  push:
    branches: [main]
    paths:
      - 'apps/mobile/android/**'
      - 'apps/mobile/app.config.ts'
      - 'apps/mobile/package.json'
      - 'apps/mobile/modules/**'
      - 'apps/mobile/plugins/**'
      - '.github/workflows/mobile-android.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mobile-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  assemble-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      - uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4.7.0
        with:
          distribution: temurin
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2
      - run: bun install --frozen-lockfile
      - name: Gradle cache
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/mobile/android/.gradle
          key: gradle-mobile-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
      - name: assembleDebug
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug --no-daemon
