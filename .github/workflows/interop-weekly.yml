name: interop-weekly

# #496 G5 / C5 — packages/backup test:interop was stranded (env-gated,
# referenced by no workflow). Weekly schedule + manual dispatch.
on:
  schedule:
    - cron: '0 9 * * 1' # Monday 09:00 UTC
  workflow_dispatch:

concurrency:
  group: interop-weekly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backup-interop:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      - name: Cache Bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bunx turbo run build --filter=@centraid/backup...
      - name: Run backup interop suite
        env:
          CLAWGNITION_INTEROP: '1'
        run: bun run test:interop:backup
