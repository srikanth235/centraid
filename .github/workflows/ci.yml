name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded PR runs so stacked pushes do not queue ~18 min serial jobs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Wall-clock plan: static (format/lint/typecheck) and verify (build/tests/coverage)
# run in parallel. Each restores Turbo + Bun (+ Cargo on verify) caches so warm
# PR pushes skip cold tsc/cargo. The thin `check` job is the required gate name
# branch protection already expects; it fails if either lane fails.
jobs:
  static:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      # Turbo's native remote cache, backed by the GitHub Actions cache API via a
      # local adapter (issue #538). Replaces the old per-commit `.turbo` tarball:
      # caching is now per-task and content-addressed, so unchanged tasks are
      # re-read (LRU-refreshed) rather than re-saved as a fresh ~600 MiB blob.
      - name: Turbo remote cache (GitHub-backed, granular)
        uses: rharkor/caching-for-turbo@75f8ebf4a43d2c60b23bc2a27082cfea94ffdad9 # v2.5.0
      # turbo lint runs data-plane `cargo fmt` + `clippy`; warm target dirs cut
      # the ~1.5 min package-lint step on subsequent PR pushes.
      - name: Cache Cargo (data-plane)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            packages/tunnel/data-plane/target
          key: cargo-dataplane-${{ runner.os }}-${{ hashFiles('packages/tunnel/data-plane/Cargo.lock') }}
          restore-keys: |
            cargo-dataplane-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      # E5 — https-only / integrity markers on the lockfile (supply-chain gate).
      - run: bun run lockfile:lint
      - run: bun run format:check
      # `--format github` emits inline PR annotations on the offending lines.
      - run: bunx oxlint --format github .
      # Monorepo package.json hygiene: unused/undeclared deps, version drift
      # across workspaces, misplaced @types (sherif). Fast, offline.
      - run: bun run lint:packages
      # GitHub Actions workflow linter. Pinned container bundles shellcheck +
      # pyflakes; we gate shellcheck at error severity so pre-existing style /
      # info nits in run: blocks don't fail the build while real shell bugs do.
      - name: Lint workflows (actionlint)
        uses: docker://rhysd/actionlint:1.7.12
        env:
          SHELLCHECK_OPTS: --severity=error

      # Per-package lint scripts (mobile import boundaries, blueprint app
      # no-undef, data-plane cargo fmt/clippy) only exist under turbo.
      - run: bunx turbo run lint
      # `typecheck` dependsOn `^build` in turbo.json, so this also builds
      # package dist for consumers — no separate full-repo `build` here.
      - run: bun run typecheck
      # Type-aware pass (oxlint --type-aware); deps' dist is built by the
      # typecheck step's upstream `^build`.
      - run: bun run lint:types
      # Dead-code / unused-dependency scan (knip). Tuned as a files + dependency
      # hygiene gate: unused files, unused deps, undeclared (unlisted) deps.
      # Export/type dimensions are excluded (public-API monorepo makes them
      # ~90% false positives); run `bunx knip --include exports,types` on-demand
      # for a deep export sweep. Offline and fast, so it gates on the per-PR loop.
      - run: bun run knip
      # Product-flow catalog anti-rot (issue #458 Phase 4): fail if any
      # matrix.json cell names an owning test file that no longer exists, or a
      # named contract suite shrinks below its recorded floor. Offline and fast,
      # so it belongs on the per-PR loop next to lint/typecheck.
      - run: bun run test:matrix
      # #496 E4 — floors/minimumTests may only move upward vs the merge base
      # (or carry an approvedDeviation / approvedMinimumTestsDeviation marker).
      - name: Ratchet coverage floors and minimumTests
        run: |
          git fetch --no-tags --depth=1 origin main 2>/dev/null || true
          bun run test:ratchet
      # Pure-function unit tests for the ratchet (deletion/missing-key cases).
      - run: bun run test:ratchet:unit
      # Mobile agent-e2e flow anti-rot (issue #483): fail if a Maestro flow
      # asserts on a tab/route label that is drawn on every screen, or types
      # input it never verifies. The flows themselves run nightly, but linting
      # their source is offline and fast, so it gates on the per-PR loop.
      - run: bun run lint:e2e-flows

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Full history so test:diff-coverage can resolve merge-base vs origin/main.
          fetch-depth: 0
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      # Turbo native remote cache via the GitHub-backed adapter (see static job).
      - name: Turbo remote cache (GitHub-backed, granular)
        uses: rharkor/caching-for-turbo@75f8ebf4a43d2c60b23bc2a27082cfea94ffdad9 # v2.5.0
      - name: Cache Cargo (data-plane + iroh-wasm)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.cargo/bin
            packages/tunnel/data-plane/target
            apps/web/iroh-wasm/target
          key: cargo-verify-${{ runner.os }}-${{ hashFiles('packages/tunnel/data-plane/Cargo.lock', 'apps/web/iroh-wasm/Cargo.lock') }}
          restore-keys: |
            cargo-verify-${{ runner.os }}-
            cargo-dataplane-${{ runner.os }}-
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      # K15 — wasm is gitignored; clean CI must rebuild via ensure-iroh-wasm.
      - name: Ensure Iroh WASM toolchain
        run: bash scripts/ci/ensure-iroh-wasm-toolchain.sh
      - run: bun install --frozen-lockfile
      # Build every package's dist (the worker-thread handler tests load the
      # built worker, not the .ts source), then run the whole suite under
      # vitest with v8 coverage. `coverage` enforces the seeded engine floors
      # in vitest.config.ts; a test failure or a floor breach fails CI.
      - run: bun run build
      # The normal @centraid/tunnel build above ships its target-specific napi
      # module. Prove both pairing ALPNs plus streamed request/response bytes.
      - run: bun run --cwd packages/tunnel test:native
      # Rust format compatibility and the language-independent byte-plane
      # lifecycle contract are non-negotiable rollout gates (N0a/N0b).
      - run: bun run --cwd packages/tunnel test:data-plane
      # Issue #456's real-gateway budget gate. Linux strace supplies an exact
      # fsync/write count; losing that signal is itself a benchmark failure.
      - run: sudo apt-get update && sudo apt-get install --yes strace
      # #532 — per-PR perf gate: gateway low-end budgets (fsync-count on Linux).
      # Budget *numbers* also ratchet tighten-only via test:ratchet on static.
      # One automatic retry absorbs shared-runner event-loop noise (main is green
      # on the same budgets; a single noisy sample should not fail the PR).
      - name: Per-PR perf gate (gateway low-end budgets)
        run: bun run test:perf:pr || bun run test:perf:pr
        env:
          CENTRAID_BENCH_REQUIRE_FSYNC: '1'
          CENTRAID_HARDWARE_PROFILE: constrained
      - run: bun run coverage
      # #532 — changed-line coverage vs origin/main must be ≥80% (or approvedDeviation).
      - name: Fetch origin/main for diff coverage
        run: git fetch --no-tags --depth=1 origin main 2>/dev/null || true
      - name: Diff coverage on changed lines
        run: bun run test:diff-coverage
      - name: Generate test-health report
        if: always()
        run: bun run test:report
      # Job Summary is local to the Actions run (PRs included). Public Pages
      # HTML is main-only — see publish-report.
      - name: Write Job Summary
        if: always()
        env:
          TEST_REPORT_PUBLIC_URL: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && format('https://{0}.github.io/{1}/test-report/main/', github.repository_owner, github.event.repository.name) || '' }}
        run: node scripts/test-report/write-job-summary.mjs --report-url "$TEST_REPORT_PUBLIC_URL"
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: test-health-report
          path: dist/test-report/
          retention-days: 14

  # Public HTML on GitHub Pages — main branch only (not PRs).
  # Merges into the gh-pages tree so nightly slots survive, then deploys via
  # GitHub Pages (workflow build type). Does not gate the required `check` job.
  publish-report:
    needs: [verify]
    if: >
      always() &&
      needs.verify.result != 'cancelled' &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Serialize with nightly so deploys do not race on gh-pages.
    concurrency:
      group: github-pages-test-report
      cancel-in-progress: false
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.slot.outputs.url }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Download test-health report
        id: download_report
        continue-on-error: true
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: test-health-report
          path: dist/test-report
      - name: Require report HTML
        id: has_report
        run: |
          if [ -f dist/test-report/index.html ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::test-health-report artifact missing; skip Pages publish"
          fi
      - name: Restore previous Pages tree (gh-pages)
        if: steps.has_report.outputs.ok == 'true'
        continue-on-error: true
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: gh-pages
          path: site
      - name: Seed site if gh-pages missing
        if: steps.has_report.outputs.ok == 'true'
        run: |
          mkdir -p site
          rm -rf site/.git
      - name: Resolve report slot
        if: steps.has_report.outputs.ok == 'true'
        id: slot
        run: |
          SLOT="main"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          echo "slot=${SLOT}" >> "$GITHUB_OUTPUT"
          echo "url=https://${OWNER}.github.io/${REPO}/test-report/${SLOT}/" >> "$GITHUB_OUTPUT"
      - name: Merge report into site tree
        if: steps.has_report.outputs.ok == 'true'
        run: |
          node scripts/test-report/prepare-pages-site.mjs \
            --report dist/test-report \
            --site site \
            --slot "${{ steps.slot.outputs.slot }}"
      - name: Persist site on gh-pages (merge source for next runs)
        if: steps.has_report.outputs.ok == 'true'
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: false
          enable_jekyll: false
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
      - name: Upload Pages artifact
        if: steps.has_report.outputs.ok == 'true'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: site
      - name: Deploy to GitHub Pages
        if: steps.has_report.outputs.ok == 'true'
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

  # #532 — per-PR mutation on affected property-defended seeds only. Skips when
  # the diff touches none of the seed watch paths; enforces mutation floors on
  # packages that ran. Full eight-package Stryker remains nightly (e2e.yml).
  mutation-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - name: Fetch merge base for affected mutation
        run: git fetch --no-tags --depth=1 origin main 2>/dev/null || true
      # Workspace package entry points (dist/) must exist so vitest can resolve
      # @centraid/* imports when Stryker runs from a package cwd. Without this,
      # vault/automation dry-runs fail with "No tests were executed".
      - name: Build packages for mutation seeds
        run: bunx turbo run build --filter='./packages/*'
      - name: Per-PR mutation (affected seeds + floors)
        run: bun run test:mutation:pr

  # Required status check name stays `check` (historical branch protection /
  # PR rollup). Fails the workflow when either parallel lane fails or is
  # cancelled; does not re-run install or tests. publish-report is best-effort
  # UX and does not gate merge.
  check:
    needs: [static, verify, mutation-pr]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Aggregate static + verify + mutation-pr
        run: |
          echo "static=${{ needs.static.result }}"
          echo "verify=${{ needs.verify.result }}"
          echo "mutation-pr=${{ needs.mutation-pr.result }}"
          if [ "${{ needs.static.result }}" != "success" ] || [ "${{ needs.verify.result }}" != "success" ] || [ "${{ needs.mutation-pr.result }}" != "success" ]; then
            exit 1
          fi
