name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded PR runs so stacked pushes do not queue ~18 min serial jobs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Wall-clock plan: static (format/lint/typecheck) and verify (build/tests/coverage)
# run in parallel. Each restores Turbo + Bun (+ Cargo on verify) caches so warm
# PR pushes skip cold tsc/cargo. The thin `check` job is the required gate name
# branch protection already expects; it fails if either lane fails.
jobs:
  static:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      - name: Cache Bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - name: Cache Turbo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .turbo
          key: turbo-static-${{ runner.os }}-${{ hashFiles('bun.lock', 'turbo.json', 'package.json', 'packages/*/package.json', 'apps/*/package.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-static-${{ runner.os }}-${{ hashFiles('bun.lock', 'turbo.json', 'package.json', 'packages/*/package.json', 'apps/*/package.json') }}-
            turbo-static-${{ runner.os }}-
      # turbo lint runs data-plane `cargo fmt` + `clippy`; warm target dirs cut
      # the ~1.5 min package-lint step on subsequent PR pushes.
      - name: Cache Cargo (data-plane)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            packages/data-plane/target
          key: cargo-dataplane-${{ runner.os }}-${{ hashFiles('packages/data-plane/Cargo.lock') }}
          restore-keys: |
            cargo-dataplane-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run format:check
      # `--format github` emits inline PR annotations on the offending lines.
      - run: bunx oxlint --format github .
      # Per-package lint scripts (mobile import boundaries, blueprint app
      # no-undef, data-plane cargo fmt/clippy) only exist under turbo.
      - run: bunx turbo run lint
      # `typecheck` dependsOn `^build` in turbo.json, so this also builds
      # package dist for consumers — no separate full-repo `build` here.
      - run: bun run typecheck
      # Type-aware pass (oxlint --type-aware); deps' dist is built by the
      # typecheck step's upstream `^build`.
      - run: bun run lint:types
      # Product-flow catalog anti-rot (issue #458 Phase 4): fail if any
      # matrix.json cell names an owning test file that no longer exists, or a
      # named contract suite shrinks below its recorded floor. Offline and fast,
      # so it belongs on the per-PR loop next to lint/typecheck.
      - run: bun run test:matrix

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      - name: Cache Bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - name: Cache Turbo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .turbo
          key: turbo-verify-${{ runner.os }}-${{ hashFiles('bun.lock', 'turbo.json', 'package.json', 'packages/*/package.json', 'apps/*/package.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-verify-${{ runner.os }}-${{ hashFiles('bun.lock', 'turbo.json', 'package.json', 'packages/*/package.json', 'apps/*/package.json') }}-
            turbo-verify-${{ runner.os }}-
      - name: Cache Cargo (data-plane)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            packages/data-plane/target
          key: cargo-dataplane-${{ runner.os }}-${{ hashFiles('packages/data-plane/Cargo.lock') }}
          restore-keys: |
            cargo-dataplane-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      # Build every package's dist (the worker-thread handler tests load the
      # built worker, not the .ts source), then run the whole suite under
      # vitest with v8 coverage. `coverage` enforces the seeded engine floors
      # in vitest.config.ts; a test failure or a floor breach fails CI.
      - run: bun run build
      # The normal @centraid/tunnel build above ships its target-specific napi
      # module. Prove both pairing ALPNs plus streamed request/response bytes.
      - run: bun run --cwd packages/tunnel test:native
      # Rust format compatibility and the language-independent byte-plane
      # lifecycle contract are non-negotiable rollout gates (N0a/N0b).
      - run: bun run --cwd packages/data-plane test
      # Issue #456's real-gateway budget gate. Linux strace supplies an exact
      # fsync/write count; losing that signal is itself a benchmark failure.
      - run: sudo apt-get update && sudo apt-get install --yes strace
      - run: bun run --cwd packages/gateway perf:low-end
        env:
          CENTRAID_BENCH_REQUIRE_FSYNC: '1'
          CENTRAID_HARDWARE_PROFILE: constrained
      - run: bun run coverage
      - name: Generate test-health report
        if: always()
        run: bun run test:report
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: test-health-report
          path: dist/test-report/
          retention-days: 14

  # Required status check name stays `check` (historical branch protection /
  # PR rollup). Fails the workflow when either parallel lane fails or is
  # cancelled; does not re-run install or tests.
  check:
    needs: [static, verify]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Aggregate static + verify
        run: |
          echo "static=${{ needs.static.result }}"
          echo "verify=${{ needs.verify.result }}"
          if [ "${{ needs.static.result }}" != "success" ] || [ "${{ needs.verify.result }}" != "success" ]; then
            exit 1
          fi
