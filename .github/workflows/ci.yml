name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded PR runs so stacked pushes do not queue ~18 min serial jobs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Wall-clock plan: static (format/lint/typecheck) and verify (build/tests/coverage)
# run in parallel. Each restores Turbo + Bun (+ Cargo on verify) caches so warm
# PR pushes skip cold tsc/cargo. The thin `check` job is the required gate name
# branch protection already expects; it fails if either lane fails.
jobs:
  static:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      - name: Cache Bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - name: Cache Turbo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .turbo
          key: turbo-static-${{ runner.os }}-${{ hashFiles('bun.lock', 'turbo.json', 'package.json', 'packages/*/package.json', 'apps/*/package.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-static-${{ runner.os }}-${{ hashFiles('bun.lock', 'turbo.json', 'package.json', 'packages/*/package.json', 'apps/*/package.json') }}-
            turbo-static-${{ runner.os }}-
      # turbo lint runs data-plane `cargo fmt` + `clippy`; warm target dirs cut
      # the ~1.5 min package-lint step on subsequent PR pushes.
      - name: Cache Cargo (data-plane)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            packages/data-plane/target
          key: cargo-dataplane-${{ runner.os }}-${{ hashFiles('packages/data-plane/Cargo.lock') }}
          restore-keys: |
            cargo-dataplane-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run format:check
      # `--format github` emits inline PR annotations on the offending lines.
      - run: bunx oxlint --format github .
      # Per-package lint scripts (mobile import boundaries, blueprint app
      # no-undef, data-plane cargo fmt/clippy) only exist under turbo.
      - run: bunx turbo run lint
      # `typecheck` dependsOn `^build` in turbo.json, so this also builds
      # package dist for consumers — no separate full-repo `build` here.
      - run: bun run typecheck
      # Type-aware pass (oxlint --type-aware); deps' dist is built by the
      # typecheck step's upstream `^build`.
      - run: bun run lint:types
      # Product-flow catalog anti-rot (issue #458 Phase 4): fail if any
      # matrix.json cell names an owning test file that no longer exists, or a
      # named contract suite shrinks below its recorded floor. Offline and fast,
      # so it belongs on the per-PR loop next to lint/typecheck.
      - run: bun run test:matrix

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      - name: Cache Bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - name: Cache Turbo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .turbo
          key: turbo-verify-${{ runner.os }}-${{ hashFiles('bun.lock', 'turbo.json', 'package.json', 'packages/*/package.json', 'apps/*/package.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-verify-${{ runner.os }}-${{ hashFiles('bun.lock', 'turbo.json', 'package.json', 'packages/*/package.json', 'apps/*/package.json') }}-
            turbo-verify-${{ runner.os }}-
      - name: Cache Cargo (data-plane)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            packages/data-plane/target
          key: cargo-dataplane-${{ runner.os }}-${{ hashFiles('packages/data-plane/Cargo.lock') }}
          restore-keys: |
            cargo-dataplane-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      # Build every package's dist (the worker-thread handler tests load the
      # built worker, not the .ts source), then run the whole suite under
      # vitest with v8 coverage. `coverage` enforces the seeded engine floors
      # in vitest.config.ts; a test failure or a floor breach fails CI.
      - run: bun run build
      # The normal @centraid/tunnel build above ships its target-specific napi
      # module. Prove both pairing ALPNs plus streamed request/response bytes.
      - run: bun run --cwd packages/tunnel test:native
      # Rust format compatibility and the language-independent byte-plane
      # lifecycle contract are non-negotiable rollout gates (N0a/N0b).
      - run: bun run --cwd packages/data-plane test
      # Issue #456's real-gateway budget gate. Linux strace supplies an exact
      # fsync/write count; losing that signal is itself a benchmark failure.
      - run: sudo apt-get update && sudo apt-get install --yes strace
      - run: bun run --cwd packages/gateway perf:low-end
        env:
          CENTRAID_BENCH_REQUIRE_FSYNC: '1'
          CENTRAID_HARDWARE_PROFILE: constrained
      - run: bun run coverage
      - name: Generate test-health report
        if: always()
        run: bun run test:report
      - name: Write Job Summary
        if: always()
        env:
          # Anticipated Pages URL (publish-report deploys the same slot).
          TEST_REPORT_PUBLIC_URL: ${{ github.event_name == 'pull_request' && format('https://{0}.github.io/{1}/test-report/pr/{2}/', github.repository_owner, github.event.repository.name, github.event.pull_request.number) || format('https://{0}.github.io/{1}/test-report/main/', github.repository_owner, github.event.repository.name) }}
        run: node scripts/test-report/write-job-summary.mjs --report-url "$TEST_REPORT_PUBLIC_URL"      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: test-health-report
          path: dist/test-report/
          retention-days: 14

  # Public HTML report + sticky PR comment (one-hop from the PR).
  # Merges into the gh-pages tree so prior PR/nightly slots survive, then
  # deploys the full site via GitHub Pages (workflow build type).
  publish-report:
    needs: [verify]
    if: >
      always() &&
      needs.verify.result != 'cancelled' &&
      (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Serialize deploys so concurrent PRs do not wipe each other's slots.
    concurrency:
      group: github-pages-test-report
      cancel-in-progress: false
    permissions:
      contents: write
      pages: write
      id-token: write
      pull-requests: write
    environment:
      name: github-pages
      url: ${{ steps.slot.outputs.url }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Download test-health report
        id: download_report
        continue-on-error: true
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: test-health-report
          path: dist/test-report
      - name: Require report HTML
        id: has_report
        run: |
          if [ -f dist/test-report/index.html ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::test-health-report artifact missing; skip Pages publish"
          fi
      - name: Restore previous Pages tree (gh-pages)
        if: steps.has_report.outputs.ok == 'true'
        continue-on-error: true
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: gh-pages
          path: site
      - name: Seed site if gh-pages missing
        if: steps.has_report.outputs.ok == 'true'
        run: |
          mkdir -p site
          rm -rf site/.git
      - name: Resolve report slot
        if: steps.has_report.outputs.ok == 'true'
        id: slot
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SLOT="pr/${{ github.event.pull_request.number }}"
          else
            SLOT="main"
          fi
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          echo "slot=${SLOT}" >> "$GITHUB_OUTPUT"
          echo "url=https://${OWNER}.github.io/${REPO}/test-report/${SLOT}/" >> "$GITHUB_OUTPUT"
      - name: Merge report into site tree
        if: steps.has_report.outputs.ok == 'true'
        run: |
          node scripts/test-report/prepare-pages-site.mjs \
            --report dist/test-report \
            --site site \
            --slot "${{ steps.slot.outputs.slot }}"
      - name: Persist site on gh-pages (merge source for next runs)
        if: steps.has_report.outputs.ok == 'true'
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: false
          enable_jekyll: false
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
      - name: Upload Pages artifact
        if: steps.has_report.outputs.ok == 'true'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: site
      - name: Deploy to GitHub Pages
        if: steps.has_report.outputs.ok == 'true'
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
      - name: Build sticky PR comment body
        if: steps.has_report.outputs.ok == 'true' && github.event_name == 'pull_request'
        env:
          TEST_REPORT_PUBLIC_URL: ${{ steps.slot.outputs.url }}
        run: |
          node --input-type=module <<'EOF'
          import { readFile, writeFile } from 'node:fs/promises';
          import { renderSummaryMarkdown } from './scripts/test-report/summary-markdown.mjs';
          const summary = JSON.parse(await readFile('dist/test-report/summary.json', 'utf8'));
          const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
          await writeFile(
            'dist/test-report/pr-comment.md',
            renderSummaryMarkdown(summary, {
              reportUrl: process.env.TEST_REPORT_PUBLIC_URL,
              runUrl,
            }),
          );
          EOF
      - name: Sticky PR comment with report link
        if: steps.has_report.outputs.ok == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- centraid-test-health-report -->';
            const body = fs.readFileSync('dist/test-report/pr-comment.md', 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # Required status check name stays `check` (historical branch protection /
  # PR rollup). Fails the workflow when either parallel lane fails or is
  # cancelled; does not re-run install or tests. publish-report is best-effort
  # UX and does not gate merge.
  check:
    needs: [static, verify]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Aggregate static + verify
        run: |
          echo "static=${{ needs.static.result }}"
          echo "verify=${{ needs.verify.result }}"
          if [ "${{ needs.static.result }}" != "success" ] || [ "${{ needs.verify.result }}" != "success" ]; then
            exit 1
          fi
