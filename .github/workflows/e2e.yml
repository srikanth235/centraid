name: e2e

# Nightly product lanes: desktop/web Playwright, mobile agent-e2e, pairing
# journeys (loopback + cross-network relay), plus the unified test-health
# report. Heavier than per-PR `ci` — schedule and workflow_dispatch only.
on:
  schedule:
    - cron: '0 6 * * *' # 06:00 UTC nightly
  workflow_dispatch:
    inputs:
      # #496 C3 — re-run one broken lane without the full ~70-min graph.
      suite:
        description: 'Which suite to run (all | desktop | web | mobile | mobile-android | pairing | report | mutation)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - desktop
          - web
          - mobile
          - mobile-android
          - pairing
          - report
          - mutation

# #496 C3 — overlapping schedule + dispatch must not double-run macOS.
concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  # E3 auto-issue on red nightly needs issues:write when the failure job runs.
  issues: write

jobs:
  desktop-e2e:
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.suite == 'all' ||
      github.event.inputs.suite == 'desktop'
    runs-on: ubuntu-latest
    # Outer backstop only — the suite's own `globalTimeout` (22m, see
    # tests/e2e/playwright.config.ts) is what fails a runaway run, because it
    # aborts while the reporter can still flush traces and the JSON report.
    # This cap MUST stay above setup (~8m) + globalTimeout so it never fires
    # first; when it does fire, the job is cancelled and all evidence is lost.
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      # Electron + Playwright need host system libraries (libnss3, libgbm, …)
      # to start a Chromium-based renderer on headless Linux. `--with-deps`
      # apt-installs them; the chromium download itself is what carries the
      # shared libs Electron also links against.
      - run: bunx playwright install --with-deps chromium
        working-directory: apps/desktop
      # Build every package's dist. The desktop main process imports the
      # gateway/runtime packages from their built dist at launch, so a bare
      # `test:e2e` (which only rebuilds the desktop package) isn't enough.
      - run: bun run build
      # safeStorage (gateway-token encryption) needs a real Secret Service on
      # Linux. Install gnome-keyring + libsecret so the `gnome-libsecret`
      # backend the app forces under test (fixtures.ts) has a keyring to talk
      # to. dbus-x11 provides the session bus the keyring registers on.
      - run: sudo apt-get update && sudo apt-get install -y gnome-keyring libsecret-1-0 libsecret-tools dbus-x11
      # `xvfb-run` gives Electron a virtual X display; `dbus-run-session` gives
      # it a private session bus. The catch on a fresh runner: D-Bus
      # auto-activates its own gnome-keyring via the service file, and that
      # daemon owns `org.freedesktop.secrets` but stays LOCKED — so safeStorage
      # still reports "not available" even though the bus name exists (this is
      # what the previous attempts hit). Fix: wipe any stale keyrings, then
      # start our own daemon with `--replace` so it TAKES OVER the bus name, and
      # `--unlock` it with an empty password (read from stdin) so the login
      # keyring is created already-open. `--foreground &` avoids the
      # daemonize-forks-before-reading-stdin trap. We then prove it end-to-end
      # with `secret-tool` (same libsecret/D-Bus path safeStorage uses): if a
      # probe secret round-trips, Electron will work — otherwise fail fast with
      # a clear message instead of 6 minutes of tests. Daemon + tests share this
      # one dbus session; `test:e2e` runs all specs (`workers: 1`, retries once).
      - run: |
          xvfb-run --auto-servernum dbus-run-session -- bash -c '
            set -x
            rm -rf ~/.local/share/keyrings
            printf "\n" | gnome-keyring-daemon --replace --components=secrets --unlock --foreground &
            sleep 2
            echo -n "probe-value" | secret-tool store --label=e2e service centraid-e2e account probe
            test "$(secret-tool lookup service centraid-e2e account probe)" = "probe-value" \
              || { echo "::error::Secret Service not usable — safeStorage would fail"; exit 1; }
            bun run test:e2e
          '
        working-directory: apps/desktop
      # On failure, keep the Playwright traces/screenshots so a flake or a real
      # regression can be inspected without re-running locally.
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: failure()
        with:
          name: desktop-e2e-traces
          path: apps/desktop/test-results/
          retention-days: 7
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: nightly-evidence-desktop
          path: artifacts/
          retention-days: 7

  web-e2e:
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.suite == 'all' ||
      github.event.inputs.suite == 'web'
    runs-on: ubuntu-latest
    # Outer backstop only — see desktop-e2e. The suite's `globalTimeout` is
    # 10m against ~1m of healthy tests; setup is ~7m.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
        working-directory: apps/web
      - run: bun run build
      - run: bun run e2e
        working-directory: apps/web
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: failure()
        with:
          name: web-e2e-traces
          path: apps/web/test-results/
          retention-days: 7
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: nightly-evidence-web
          path: artifacts/
          retention-days: 7

  mobile-e2e:
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.suite == 'all' ||
      github.event.inputs.suite == 'mobile'
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      # The iOS dev build is cached and reused whenever nothing that changes the
      # *native binary* changed. A JS/TS commit is served live by Metro, so it
      # must not pay the ~32-minute compile; a config-plugin, native-module,
      # bundle-id, or autolinked-pod change must. The cache key (built below) has
      # two independent parts:
      #
      #   fp<hash>  @expo/fingerprint over the native inputs ONLY — config
      #             plugins, autolinked native modules (read from node_modules,
      #             so the install MUST run first), the bare apps/mobile/ios
      #             project, the resolved Expo config, and the RN version. It
      #             deliberately ignores apps/mobile/src/** (Metro-served JS) and
      #             THIS workflow file, so editing either no longer forces a
      #             rebuild — the exact over-hashing the old hand-rolled
      #             `git ls-files | shasum` key suffered (it mixed in the whole
      #             e2e.yml and all of ios/, including gitignored build products,
      #             so any workflow edit or leftover build dir busted the cache).
      #             The hashing lives in apps/mobile/scripts/native-fingerprint.mjs.
      #   xc<hash>  the host toolchain (Xcode build + iphonesimulator SDK).
      #             @expo/fingerprint hashes the PROJECT, not the MACHINE — so a
      #             binary built by a newer Xcode after a macos-15 image roll must
      #             still not be reused; this component forces that rebuild. It
      #             subsumes the old key's raw ImageOS (the Xcode/SDK version is
      #             the part of the image that actually matters here).
      #
      # Deliberately NOT caching turbo here. A per-sha key never hits, so every
      # run would SAVE a fresh multi-hundred-MB blob; against GitHub's 10 GB
      # per-repo budget with LRU eviction, the natural victim is the .app entry
      # below — which is only ever read, never re-saved on a hit.
      - run: bun install --frozen-lockfile
      - name: Fingerprint the iOS native build inputs
        id: native
        working-directory: apps/mobile
        run: |
          set -euo pipefail
          # @expo/fingerprint reads node_modules for the autolinked native tree,
          # so this runs after `bun install` above. The script prints the bare
          # hash and hard-fails on an empty digest (no constant false-hit key).
          fp="$(node scripts/native-fingerprint.mjs ios)"
          test -n "$fp" || { echo "::error::empty iOS fingerprint"; exit 1; }
          # Toolchain captured separately: `a="$(cmd1; cmd2)"` keeps only cmd2's
          # exit status, so a broken xcodebuild would silently weaken the key
          # instead of failing the step.
          xcode="$(xcodebuild -version)"
          sdk="$(xcrun --show-sdk-version --sdk iphonesimulator)"
          xc="$(printf '%s\n%s\n' "$xcode" "$sdk" | shasum -a 256 | cut -d' ' -f1)"
          echo "hash=xc${xc:0:12}-fp${fp}" >> "$GITHUB_OUTPUT"
          echo "iOS native fingerprint: fp=$fp toolchain(xc)=$xc"
      - name: Build and start the tokenless mobile test gateway
        # Scoped to the gateway's dependency subgraph instead of a full
        # `bun run build`. tests/agent-e2e-mobile/lib/ci-gateway.mjs imports only
        # packages/gateway/dist, and turbo pulls every workspace dependency
        # (vault, app-engine, agent-runtime, automation, backup, blueprints,
        # tunnel, client, web, design-tokens) in transitively — nothing
        # the mobile job needs is dropped. The saving is narrow but real, and
        # comes almost entirely from dropping @centraid/desktop (skills and
        # data-plane folded into gateway/tunnel in #495).
        run: |
          bunx turbo run build --filter=@centraid/gateway
          gateway_dir="$RUNNER_TEMP/centraid-mobile-gateway"
          nohup node tests/agent-e2e-mobile/lib/ci-gateway.mjs "$gateway_dir" 18789 > /tmp/centraid-mobile-gateway.log 2>&1 &
          echo "CENTRAID_MOBILE_GATEWAY_PID=$!" >> "$GITHUB_ENV"
          echo "MAESTRO_GATEWAY_URL=http://127.0.0.1:18789" >> "$GITHUB_ENV"
          for attempt in {1..90}; do
            if curl -fsS http://127.0.0.1:18789/centraid/_apps; then exit 0; fi
            sleep 2
          done
          cat /tmp/centraid-mobile-gateway.log
          exit 1
      - name: Install Maestro CLI
        # The mobile agent-e2e flows drive the installed app through Maestro
        # (tests/agent-e2e-mobile/lib/harness.mjs → `maestro --udid … test`).
        # Pin the CLI: the install script honors MAESTRO_VERSION and otherwise
        # pulls whatever is at `releases/latest`, so an upstream release could
        # silently change device-driving behavior mid-nightly. cli-2.6.1 is the
        # current stable release (github.com/mobile-dev-inc/maestro/releases).
        env:
          MAESTRO_VERSION: 2.6.1
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
      - name: Boot an iOS simulator
        run: |
          udid="$(xcrun simctl list devices available --json | node -e '
            let input="";
            process.stdin.on("data", chunk => input += chunk);
            process.stdin.on("end", () => {
              const devices = Object.values(JSON.parse(input).devices).flat();
              const phone = devices.find(device => device.isAvailable && /iPhone/.test(device.name));
              if (!phone) process.exit(1);
              process.stdout.write(phone.udid);
            });
          ')"
          echo "SIMULATOR_UDID=$udid" >> "$GITHUB_ENV"
          xcrun simctl boot "$udid" || true
          xcrun simctl bootstatus "$udid" -b
      # The built .app for the simulator. This is the single biggest win in the
      # job (~32m of the 51m). Keyed on the native fingerprint above, so a commit
      # that touches only JS reuses the binary while ANY native-input or Xcode
      # change forces a rebuild. No `restore-keys`: a partial-match fallback is
      # exactly the stale-binary false-pass this must never allow — the key is
      # all-or-nothing.
      #
      # restore + save are SPLIT rather than the one-step `actions/cache`, because
      # that action declares `post-if: success()` — it saves only when the whole
      # job succeeded. On a lane that is currently red that means the cache never
      # populates, so the 32-minute build is paid on every run and the warm path
      # is unreachable until the very greenness the cache is meant to help
      # deliver. Observed exactly that in runs 29762312605 and 29765712825: the
      # post step reported `skipped` and the native build ran full-length both
      # times. The save below runs `if: always()`, so a red run still banks the
      # binary it built. That is safe because the key is content-addressed: the
      # artifact is the product of those inputs whether or not a later Maestro
      # flow passed.
      - name: Restore the built iOS app
        id: ios_app
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/centraid-mobile-e2e
          key: ios-app-${{ runner.os }}-${{ steps.native.outputs.hash }}
      # Deliberately NOT caching CocoaPods. A Pods cache hit leaves
      # ios/Pods/Manifest.lock matching Podfile.lock, so Expo CLI skips
      # `pod install` entirely — and `pod install` is the ONLY thing that runs
      # the centraid-tunnel podspec's prepare_command, which downloads the
      # git-ignored Iroh.xcframework and IrohLib.swift. Those are a vendored
      # framework and a compiled source of that pod, so skipping the fetch breaks
      # the native build outright. It would not even fail on the first run: the
      # cache is empty then. It would fail on the second native change, which is
      # exactly the path a pods cache exists to serve.
      - name: Build and install the mobile development app
        id: ios_build
        if: steps.ios_app.outputs.cache-hit != 'true'
        working-directory: apps/mobile
        run: |
          set -euo pipefail
          bunx expo run:ios --device "$SIMULATOR_UDID" --no-bundler
          # Copy the product out of derived data into the cached location. Fail
          # hard if it cannot be found: caching an empty directory would turn
          # every later run into a silent no-install.
          app="$(find ios/build ~/Library/Developer/Xcode/DerivedData \
            -maxdepth 8 -type d -name 'Centraid.app' -path '*-iphonesimulator*' -print -quit 2>/dev/null || true)"
          test -n "$app" || { echo "::error::built Centraid.app not found"; exit 1; }
          rm -rf ~/.cache/centraid-mobile-e2e
          mkdir -p ~/.cache/centraid-mobile-e2e
          # -R preserves the bundle's symlinks/permissions.
          cp -R "$app" ~/.cache/centraid-mobile-e2e/Centraid.app
          # Signals the save step below that there is a real bundle to bank.
          echo 'built=true' >> "$GITHUB_OUTPUT"
      # Banked even when a later step fails — see the note on the restore step.
      # Guarded on the build having actually run and produced a bundle, so a
      # cache-hit run does not re-save what it just restored, and a run that
      # died before the build cannot cache an empty directory.
      - name: Save the built iOS app
        if: always() && steps.ios_build.outputs.built == 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/centraid-mobile-e2e
          key: ios-app-${{ runner.os }}-${{ steps.native.outputs.hash }}
      - name: Install the cached mobile development app
        if: steps.ios_app.outputs.cache-hit == 'true'
        run: |
          set -euo pipefail
          app="$HOME/.cache/centraid-mobile-e2e/Centraid.app"
          test -d "$app" || { echo "::error::cached Centraid.app missing"; exit 1; }
          # Prove the cached bundle is the app the flows actually drive. The
          # Maestro harness launches by bundle id, so a mismatch here would fail
          # obscurely at flow time instead of loudly right now.
          bundle_id="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$app/Info.plist")"
          test "$bundle_id" = 'dev.centraid.mobile' \
            || { echo "::error::cached app bundle id is '$bundle_id', expected dev.centraid.mobile"; exit 1; }
          test -x "$app/Centraid" || { echo "::error::cached app has no executable"; exit 1; }
          xcrun simctl install "$SIMULATOR_UDID" "$app"
          # Confirm the simulator agrees the app is installed and resolvable.
          xcrun simctl get_app_container "$SIMULATOR_UDID" dev.centraid.mobile
      - name: Start Metro
        run: |
          CI=1 nohup bunx expo start --dev-client > /tmp/centraid-metro.log 2>&1 &
          for attempt in {1..90}; do
            if curl -fsS http://127.0.0.1:8081/status; then exit 0; fi
            sleep 2
          done
          cat /tmp/centraid-metro.log
          exit 1
        working-directory: apps/mobile
      - run: node scripts/test-report/prepare.mjs
      - name: Run all committed mobile journeys
        env:
          MAESTRO_PLATFORM: ios
        run: |
          node tests/agent-e2e-mobile/flows/home-loads.mjs
          node tests/agent-e2e-mobile/flows/template-gate.mjs
          node tests/agent-e2e-mobile/flows/native-v0-resilience.mjs
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: nightly-evidence-mobile
          path: |
            artifacts/
            tests/agent-e2e-mobile/runs/
          retention-days: 7

  # #496 PC1 — Android home-loads at least every nightly (macOS minutes free on
  # public repos). Leaner than iOS: only home-loads; longer paths stay on iOS.
  # Flake budget: one retry at the flow harness; job failure still reds nightly.
  # macos-15 is Apple Silicon → arm64-v8a AVD (x86_64 will not boot without HAX).
  # Metro must be up before Maestro (harness hard-fails without it; iOS job does this).
  mobile-e2e-android:
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.suite == 'all' ||
      github.event.inputs.suite == 'mobile-android'
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      # Fingerprint the Android native build inputs — same mechanism as the iOS
      # job (apps/mobile/scripts/native-fingerprint.mjs). Keyed so a JS-only
      # commit reuses the cached .apk while any native-input change rebuilds it.
      # The Android build toolchain (Gradle/AGP/NDK/compileSdk) lives in the
      # tracked android/ gradle files, which the fingerprint already hashes; the
      # host JDK is folded in separately (jdk<hash>), mirroring iOS's xc<hash>.
      - name: Fingerprint the Android native build inputs
        id: native_android
        working-directory: apps/mobile
        run: |
          set -euo pipefail
          fp="$(node scripts/native-fingerprint.mjs android)"
          test -n "$fp" || { echo "::error::empty Android fingerprint"; exit 1; }
          jdk="$(java -version 2>&1 | head -1 | shasum -a 256 | cut -d' ' -f1)"
          echo "hash=jdk${jdk:0:12}-fp${fp}" >> "$GITHUB_OUTPUT"
          echo "Android native fingerprint: fp=$fp jdk=$jdk"
      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
      - name: Build mobile workspace (host, before emulator)
        run: bunx turbo run build --filter=@centraid/mobile...
      - name: Start Metro
        working-directory: apps/mobile
        run: |
          CI=1 nohup bunx expo start --dev-client > /tmp/centraid-metro-android.log 2>&1 &
          for attempt in {1..90}; do
            if curl -fsS http://127.0.0.1:8081/status; then exit 0; fi
            sleep 2
          done
          cat /tmp/centraid-metro-android.log
          exit 1
      # Restore the built Android dev-client .apk. Same all-or-nothing, split
      # restore/save rationale as the iOS job: the emulator action's script runs
      # the build, so a cache HIT skips gradle entirely and just adb-installs the
      # banked apk. No restore-keys — a partial match would install a stale apk.
      - name: Restore the built Android app
        id: android_app
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/centraid-mobile-e2e-android
          key: android-app-${{ runner.os }}-${{ steps.native_android.outputs.hash }}
      - name: Set up Android SDK + emulator
        id: emu
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        env:
          # Read inside the action's script to branch build-vs-install. The apk
          # lives under $HOME so it carries from the restore step into the
          # action's shell (same runner, same home).
          ANDROID_CACHE_HIT: ${{ steps.android_app.outputs.cache-hit }}
        with:
          api-level: 34
          arch: arm64-v8a
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            set -euo pipefail
            cached_apk="$HOME/.cache/centraid-mobile-e2e-android/app-debug.apk"
            if [ "${ANDROID_CACHE_HIT:-}" = "true" ] && [ -f "$cached_apk" ]; then
              # Warm path: skip the native build, install the banked dev-client
              # apk, and set up the Metro reverse tunnel that `expo run:android`
              # would normally create so the app can reach the host bundler on 8081.
              echo "Android cache hit — installing $cached_apk (skipping gradle)"
              adb install -r "$cached_apk"
              adb reverse tcp:8081 tcp:8081
            else
              cd apps/mobile
              # Always --no-bundler: Metro is already running on the host. A fallback
              # without --no-bundler would spawn a second Metro and hang the job.
              bunx expo run:android --no-bundler --device
              cd ../..
              # Bank the debug apk under the content-addressed cache path. Fail
              # hard if it is missing rather than caching nothing (a later hit
              # would install nothing and fail obscurely at flow time). Signal the
              # save step below that there is a real apk to bank.
              apk="$(find apps/mobile/android -type f -path '*/outputs/apk/debug/*.apk' -print -quit 2>/dev/null || true)"
              test -n "$apk" || { echo "::error::built debug apk not found"; exit 1; }
              mkdir -p "$(dirname "$cached_apk")"
              cp "$apk" "$cached_apk"
              echo 'built=true' >> "$GITHUB_OUTPUT"
            fi
            node scripts/test-report/prepare.mjs
            MAESTRO_PLATFORM=android node tests/agent-e2e-mobile/flows/home-loads.mjs
      # Bank the apk even if a later flow failed — the artifact is the product of
      # the fingerprinted inputs regardless of whether Maestro passed (see iOS).
      # Guarded on the build having actually produced an apk, so a cache-hit run
      # does not re-save what it just restored and a run that died before the
      # build cannot cache an empty directory.
      - name: Save the built Android app
        if: always() && steps.emu.outputs.built == 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/centraid-mobile-e2e-android
          key: android-app-${{ runner.os }}-${{ steps.native_android.outputs.hash }}
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: nightly-evidence-mobile-android
          path: |
            artifacts/
            tests/agent-e2e-mobile/runs/
          retention-days: 7

  # Pairing journeys (issue #289 / matrix tunnel-pairing). Independent jobs so
  # one failure still leaves evidence from the others for the health report.
  pairing-lifecycle:
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.suite == 'all' ||
      github.event.inputs.suite == 'pairing'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - run: bun install --frozen-lockfile
      - run: bunx turbo run build --filter=@centraid/gateway --filter=@centraid/tunnel
      - run: node scripts/test-report/prepare.mjs
      - run: node tests/agent-e2e-pairing/flows/device-pairing-lifecycle.mjs
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: nightly-evidence-pairing-lifecycle
          path: |
            artifacts/
            tests/agent-e2e-pairing/runs/
          retention-days: 7

  pairing-ticket-hygiene:
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.suite == 'all' ||
      github.event.inputs.suite == 'pairing'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - run: bun install --frozen-lockfile
      - run: bunx turbo run build --filter=@centraid/gateway --filter=@centraid/tunnel
      - run: node scripts/test-report/prepare.mjs
      - run: node tests/agent-e2e-pairing/flows/pairing-ticket-hygiene.mjs
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: nightly-evidence-pairing-ticket-hygiene
          path: |
            artifacts/
            tests/agent-e2e-pairing/runs/
          retention-days: 7

  pairing-cross-network-relay:
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.suite == 'all' ||
      github.event.inputs.suite == 'pairing'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - run: bun install --frozen-lockfile
      - run: docker info
      - run: bunx turbo run build --filter=@centraid/gateway --filter=@centraid/tunnel
      - run: node scripts/test-report/prepare.mjs
      # Production must never silently fall back to the JS byte pump.
      - run: test -f packages/tunnel/native/centraid-tunnel-native.linux-x64.node
      - run: node tests/agent-e2e-pairing/flows/cross-network-relay.mjs
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: nightly-evidence-pairing-cross-network-relay
          path: |
            artifacts/
            tests/agent-e2e-pairing/runs/
          retention-days: 7

  # #532 — Stryker mutation lane (nightly, all seeds). Per-PR runs affected
  # seeds only via ci.yml mutation-pr. Floors ratcheted via
  # tests/mutation-floors.json + test:ratchet; per-PR enforces measured floors.
  mutation-testing:
    if: >
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.suite == 'all' ||
      github.event.inputs.suite == 'report' ||
      github.event.inputs.suite == 'mutation'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Run Stryker on seed packages
        run: bun run test:mutation
        continue-on-error: true
      # Upload `artifacts/` (not `artifacts/mutation/`) so merge-multiple download
      # into the report job's `artifacts/` path keeps `mutation/scores.json` —
      # same layout as desktop/web/pairing evidence jobs. Uploading the mutation
      # subdir alone flattens scores.json to the artifact root.
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: nightly-evidence-mutation
          path: artifacts/
          retention-days: 14

  test-health-report:
    needs:
      [
        desktop-e2e,
        web-e2e,
        mobile-e2e,
        mobile-e2e-android,
        pairing-lifecycle,
        pairing-ticket-hygiene,
        pairing-cross-network-relay,
        mutation-testing,
      ]
    if: >
      always() &&
      (
        github.event_name != 'workflow_dispatch' ||
        github.event.inputs.suite == 'all' ||
        github.event.inputs.suite == 'report'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      # Same-run evidence only (desktop/web/mobile/pairing). Pairing no longer
      # pulls artifacts from a separate scheduled workflow run.
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          pattern: nightly-evidence-*
          path: artifacts
          merge-multiple: true
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            artifacts/perf
            artifacts/scale
          key: quality-history-${{ runner.os }}-${{ github.run_id }}
          restore-keys: quality-history-${{ runner.os }}-
      - run: sudo apt-get update && sudo apt-get install -y strace
      - run: bun run build
      - id: coverage
        continue-on-error: true
        run: bun run coverage
      - id: perf
        continue-on-error: true
        run: bun run test:perf
      - id: scale
        continue-on-error: true
        run: bun run test:scale
      # Durable trend source: the append-only summary series committed to
      # gh-pages. Unlike the quality-history cache above it is never evicted.
      - name: Restore durable report history (gh-pages)
        if: always()
        continue-on-error: true
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: gh-pages
          path: .gh-pages-history
      - name: Stage durable report history
        if: always()
        run: |
          mkdir -p artifacts/report-history
          if [ -d .gh-pages-history/test-report/history ]; then
            cp .gh-pages-history/test-report/history/*.json artifacts/report-history/ || true
          fi
          rm -rf .gh-pages-history
      - name: Generate full nightly report
        if: always()
        run: bun run test:report
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: always()
        with:
          name: nightly-test-health-report
          path: dist/test-report/
          retention-days: 30
      - name: Write Job Summary
        if: always()
        env:
          TEST_REPORT_PUBLIC_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/test-report/nightly/
        run: node scripts/test-report/write-job-summary.mjs --report-url "$TEST_REPORT_PUBLIC_URL" --title "Nightly test health"
      - name: Preserve lane failures after publishing the report
        if: steps.coverage.outcome == 'failure' || steps.perf.outcome == 'failure' || steps.scale.outcome == 'failure'
        run: exit 1

  # Public nightly HTML (same Pages tree as main; no per-PR slots).
  # #496 E2 — main-only so branch workflow_dispatch cannot red the workflow
  # with "Branch … is not allowed to deploy to github-pages".
  # Only when test-health-report actually produced the artifact. Single-lane
  # dispatch (suite != all/report) skips the report job; running publish on
  # skipped/failure would false-alarm "HTML missing" (#496 review).
  publish-nightly-report:
    needs: [test-health-report]
    if: >
      always() &&
      needs.test-health-report.result == 'success' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: github-pages-test-report
      cancel-in-progress: false
    permissions:
      contents: write
      pages: write
      id-token: write
      # Job-level permissions replace workflow-level; without this, the
      # "HTML missing" auto-issue step 403s on the exact alert path (#496 E2).
      issues: write
    environment:
      name: github-pages
      url: ${{ steps.slot.outputs.url }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Download nightly report
        id: download_report
        continue-on-error: true
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: nightly-test-health-report
          path: dist/test-report
      - name: Require report HTML
        id: has_report
        run: |
          if [ -f dist/test-report/index.html ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::nightly-test-health-report missing; skip Pages publish"
            echo "::error::nightly report HTML missing — publish skipped (visible, not silent)"
          fi
      - name: Open tracking issue when HTML is missing
        if: steps.has_report.outputs.ok != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE='[nightly] test-health report HTML missing'
          BODY="Nightly publish skipped because \`dist/test-report/index.html\` was missing.

          - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - Workflow: e2e / publish-nightly-report
          - Ref: \`${{ github.ref }}\`

          Auto-filed by #496 E2/E3. Update this issue rather than opening duplicates."
          existing="$(gh issue list --search "in:title [nightly] test-health report HTML missing" --state open --json number --jq '.[0].number' || true)"
          if [ -n "$existing" ] && [ "$existing" != "null" ]; then
            gh issue comment "$existing" --body "$BODY" || echo "::warning::could not comment on issue #$existing"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label 'tech-debt' || \
              gh issue create --title "$TITLE" --body "$BODY" || \
              echo "::warning::could not open tracking issue (permission or label)"
          fi
      - name: Restore previous Pages tree (gh-pages)
        if: steps.has_report.outputs.ok == 'true'
        continue-on-error: true
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: gh-pages
          path: site
      - name: Seed site if gh-pages missing
        if: steps.has_report.outputs.ok == 'true'
        run: |
          mkdir -p site
          rm -rf site/.git
      - name: Resolve report slot
        if: steps.has_report.outputs.ok == 'true'
        id: slot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SLOT="nightly"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          # Authoritative run timestamp (not `date` at publish time, so a
          # re-publish of the same run lands in the same dated slot).
          RUN_DATE="$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --jq '.created_at' 2>/dev/null | cut -c1-10 || true)"
          case "$RUN_DATE" in
            [0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]) ;;
            *) RUN_DATE="$(date -u +%F)" ;;
          esac
          echo "slot=${SLOT}" >> "$GITHUB_OUTPUT"
          echo "date=${RUN_DATE}" >> "$GITHUB_OUTPUT"
          echo "url=https://${OWNER}.github.io/${REPO}/test-report/${SLOT}/" >> "$GITHUB_OUTPUT"
      - name: Merge report into site tree
        if: steps.has_report.outputs.ok == 'true'
        run: |
          node scripts/test-report/prepare-pages-site.mjs \
            --report dist/test-report \
            --site site \
            --slot "${{ steps.slot.outputs.slot }}" \
            --date "${{ steps.slot.outputs.date }}" \
            --run-id "${{ github.run_id }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --keep 30
      - name: Persist site on gh-pages
        if: steps.has_report.outputs.ok == 'true'
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: false
          enable_jekyll: false
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
      - name: Upload Pages artifact
        if: steps.has_report.outputs.ok == 'true'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: site
      - name: Deploy to GitHub Pages
        if: steps.has_report.outputs.ok == 'true'
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

  # #496 E3 — single tracking issue when a *scheduled* nightly goes red.
  # Soft SLA (documented in TESTING.md): open/update issue with run + report links.
  nightly-failure-issue:
    needs:
      [
        desktop-e2e,
        web-e2e,
        mobile-e2e,
        mobile-e2e-android,
        pairing-lifecycle,
        pairing-ticket-hygiene,
        pairing-cross-network-relay,
        test-health-report,
      ]
    if: >
      always() &&
      github.event_name == 'schedule' &&
      github.ref == 'refs/heads/main' &&
      (
        needs.desktop-e2e.result == 'failure' ||
        needs.web-e2e.result == 'failure' ||
        needs.mobile-e2e.result == 'failure' ||
        needs.mobile-e2e-android.result == 'failure' ||
        needs.pairing-lifecycle.result == 'failure' ||
        needs.pairing-ticket-hygiene.result == 'failure' ||
        needs.pairing-cross-network-relay.result == 'failure' ||
        needs.test-health-report.result == 'failure'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Open or update nightly red tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/test-report/nightly/"
          TITLE='[nightly] e2e lane red — tracking'
          BODY="$(cat <<EOF
          ## Nightly e2e failure

          A **scheduled** nightly run failed. Soft SLA (#496 / TESTING.md): respond within **24h** or before the next scheduled run.

          | Signal | Link |
          | --- | --- |
          | Actions run | ${RUN_URL} |
          | Nightly report (Pages) | ${REPORT_URL} |
          | Job Summary | open the run → Summary |

          ### Job results
          - desktop-e2e: \`${{ needs.desktop-e2e.result }}\`
          - web-e2e: \`${{ needs.web-e2e.result }}\`
          - mobile-e2e: \`${{ needs.mobile-e2e.result }}\`
          - mobile-e2e-android: \`${{ needs.mobile-e2e-android.result }}\`
          - pairing-lifecycle: \`${{ needs.pairing-lifecycle.result }}\`
          - pairing-ticket-hygiene: \`${{ needs.pairing-ticket-hygiene.result }}\`
          - pairing-cross-network-relay: \`${{ needs.pairing-cross-network-relay.result }}\`
          - test-health-report: \`${{ needs.test-health-report.result }}\`

          _Auto-filed by e2e.yml \`nightly-failure-issue\`. Prefer updating this issue over opening duplicates._
          EOF
          )"
          existing="$(gh issue list --search 'in:title [nightly] e2e lane red' --state open --json number --jq '.[0].number' || true)"
          if [ -n "${existing:-}" ] && [ "$existing" != "null" ]; then
            gh issue comment "$existing" --body "$BODY"
            echo "Updated issue #$existing"
          else
            gh issue create --title "$TITLE" --body "$BODY" || true
          fi
