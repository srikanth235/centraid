name: docs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - docs/**
      - scripts/docs-site/**
      - scripts/home-site/**
      - .github/workflows/docs.yml
      - package.json
      - bun.lock
  pull_request:
    paths:
      - docs/**
      - scripts/docs-site/**
      - scripts/home-site/**
      - .github/workflows/docs.yml
      - package.json
      - bun.lock

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # CI gate only. This workflow does NOT deploy — Cloudflare's own Git
  # integration builds (`bun run docs:bundle` → ./dist/site) and runs
  # `wrangler deploy` on push. Here we just build the site exactly as production
  # does (base=/docs) and run the smoke checks so a broken tree never merges.
  build:
    runs-on: ubuntu-latest
    env:
      DOCS_SITE_BASE_PATH: /docs
      DOCS_SITE_CANONICAL_ORIGIN: https://centraid.dev/docs
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run docs:bundle
      - run: bun run docs:smoke
