name: cache-prune

# Keeps the 10 GB Actions cache pool under control (issue #538). Policy:
#   - refs/pull/<n>/merge caches whose PR is closed/merged  -> delete (dead:
#     only that PR's own runs can ever read them).
#   - refs/heads/* caches                                   -> keep the newest
#     KEEP per (ref, family); delete the rest.
# "family" = the cache key with its trailing content hashes stripped, so all the
# per-commit / per-lockfile variants of one logical cache are grouped together.
#
# Rollout: schedule runs are DRY (report-only) until SCHEDULE_DRY_RUN below is
# flipped to false. Use `workflow_dispatch` with dry_run=false to prune on demand.

on:
  schedule:
    - cron: '0 8 * * *' # 08:00 UTC, after the 06:00 nightly e2e settles
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Report only, do not delete'
        type: boolean
        default: true

permissions:
  actions: write # delete caches
  pull-requests: read # read PR open/closed state
  contents: read

concurrency:
  group: cache-prune
  cancel-in-progress: false

jobs:
  prune:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            // Flip to false once the dry-run report has been confirmed (#538).
            const SCHEDULE_DRY_RUN = true;
            const KEEP = 2;
            // Granular, content-addressed caches (the turbo GitHub-backed adapter
            // keys everything `turbogha_<taskhash>`) must NOT be keep-N pruned:
            // each entry is a distinct task artifact, not a successive version of
            // one blob, so collapsing them by family and keeping only the newest
            // few would gut the cache. They are small and recreated on demand —
            // GitHub's LRU manages them. Rule 1 (dead-PR deletion) still applies.
            const EXEMPT_KEEP_N_PREFIXES = ['turbogha_'];

            const isDispatch = context.eventName === 'workflow_dispatch';
            // workflow_dispatch boolean inputs arrive as the strings 'true'/'false'.
            const dryRun = isDispatch
              ? (context.payload.inputs || {}).dry_run !== 'false'
              : SCHEDULE_DRY_RUN;

            const { owner, repo } = context.repo;
            const caches = await github.paginate(
              'GET /repos/{owner}/{repo}/actions/caches',
              { owner, repo, per_page: 100 },
            );

            // Resolve open/closed state for every PR that owns a cache.
            const prNums = [...new Set(
              caches.map(c => (c.ref.match(/^refs\/pull\/(\d+)\//) || [])[1]).filter(Boolean),
            )];
            const prState = {};
            for (const n of prNums) {
              try {
                const { data } = await github.rest.pulls.get({ owner, repo, pull_number: Number(n) });
                prState[n] = data.state; // 'open' | 'closed'
              } catch {
                prState[n] = 'unknown'; // be conservative: never delete on lookup failure
              }
            }

            // family = key up to the first long content hash (>=32 hex chars).
            const familyOf = (key) => {
              const i = key.search(/[0-9a-f]{32,}/);
              return i === -1 ? key : key.slice(0, i);
            };

            const MiB = (b) => (b / 1048576).toFixed(0);
            const doomed = [];
            const doomedIds = new Set();
            const condemn = (c, why) => {
              if (doomedIds.has(c.id)) return;
              doomedIds.add(c.id);
              doomed.push({ c, why });
            };

            // Rule 1: dead PR caches.
            for (const c of caches) {
              const m = c.ref.match(/^refs\/pull\/(\d+)\//);
              if (m && prState[m[1]] === 'closed') condemn(c, 'PR #' + m[1] + ' closed');
            }

            // Rule 2: keep newest KEEP per (branch ref, family).
            const groups = new Map();
            for (const c of caches) {
              if (doomedIds.has(c.id)) continue;
              if (!c.ref.startsWith('refs/heads/')) continue; // pulls handled by rule 1
              if (EXEMPT_KEEP_N_PREFIXES.some(p => c.key.startsWith(p))) continue;
              const key = JSON.stringify([c.ref, familyOf(c.key)]);
              if (!groups.has(key)) groups.set(key, []);
              groups.get(key).push(c);
            }
            for (const [key, arr] of groups) {
              arr.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
              const fam = JSON.parse(key)[1];
              for (const c of arr.slice(KEEP)) condemn(c, 'older than newest ' + KEEP + ' in ' + fam);
            }

            const totalBytes = caches.reduce((s, c) => s + c.size_in_bytes, 0);
            const freeBytes = doomed.reduce((s, x) => s + x.c.size_in_bytes, 0);
            core.summary
              .addHeading('cache-prune ' + (dryRun ? '(dry-run)' : '(live)'), 2)
              .addRaw('Pool: **' + MiB(totalBytes) + ' MiB** across ' + caches.length + ' entries. ')
              .addRaw('Condemned: **' + doomed.length + '** entries = **' + MiB(freeBytes) + ' MiB**.');
            if (doomed.length) {
              const rows = doomed
                .sort((a, b) => b.c.size_in_bytes - a.c.size_in_bytes)
                .map(x => [MiB(x.c.size_in_bytes), x.c.ref, x.why, x.c.key]);
              core.summary.addTable([
                [
                  { data: 'MiB', header: true },
                  { data: 'ref', header: true },
                  { data: 'reason', header: true },
                  { data: 'key', header: true },
                ],
                ...rows,
              ]);
            }
            await core.summary.write();

            for (const x of doomed) {
              const verb = dryRun ? 'WOULD DELETE' : 'DELETE';
              console.log(verb + ' ' + MiB(x.c.size_in_bytes) + 'MiB ' + x.c.ref + ' ' + x.c.key + ' (' + x.why + ')');
            }

            if (dryRun) {
              core.notice('Dry-run: ' + doomed.length + ' caches (' + MiB(freeBytes) + ' MiB) would be freed. Nothing deleted.');
              return;
            }
            let freed = 0;
            for (const x of doomed) {
              await github.rest.actions.deleteActionsCacheById({ owner, repo, cache_id: x.c.id });
              freed += x.c.size_in_bytes;
            }
            core.notice('Deleted ' + doomed.length + ' caches, freed ' + MiB(freed) + ' MiB.');
