name: Companion packages

on:
  workflow_dispatch:
  push:
    tags: ['companion-v*']

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run --cwd apps/extension test
      - run: bun run --cwd apps/extension typecheck
      - run: bun run --cwd apps/extension package
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: centraid-companion-packages
          path: apps/extension/artifacts/*.zip
          retention-days: 14
