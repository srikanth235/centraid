name: Iroh WASM binding

on:
  pull_request:
    paths:
      - 'apps/web/iroh-wasm/**'
      - 'apps/web/scripts/build-iroh-wasm.sh'
      - 'apps/web/src/generated/**'
      - '.github/workflows/iroh-wasm.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generated-binding:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - name: Install pinned binding tools
        run: |
          rustup target add wasm32-unknown-unknown
          cargo install wasm-bindgen-cli --version 0.2.108 --locked
          sudo apt-get update
          sudo apt-get install --yes binaryen clang
      - name: Rebuild browser binding
        env:
          CC_wasm32_unknown_unknown: /usr/bin/clang
        run: ./apps/web/scripts/build-iroh-wasm.sh
      - name: Refuse generated binding drift
        run: git diff --exit-code -- apps/web/src/generated
