name: client-e2e-pr

# L1 / E2 — path-filtered client e2e on PRs. Full suites stay on nightly e2e.yml.
# Promotion rule: if a nightly-only area burns us twice, move it here.

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - 'apps/desktop/**'
      - 'packages/client/**'
      - 'packages/design-tokens/**'
      - '.github/workflows/client-e2e-pr.yml'

concurrency:
  group: client-e2e-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      desktop: ${{ steps.filter.outputs.desktop }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/client/**'
              - 'packages/design-tokens/**'
            desktop:
              - 'apps/desktop/**'
              - 'packages/client/**'
              - 'packages/design-tokens/**'

  web-e2e:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache Iroh WASM cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.cargo/bin
            apps/web/iroh-wasm/target
          key: cargo-iroh-wasm-${{ runner.os }}-${{ hashFiles('apps/web/iroh-wasm/Cargo.lock') }}
          restore-keys: |
            cargo-iroh-wasm-${{ runner.os }}-
      - name: Ensure Iroh WASM toolchain
        run: bash scripts/ci/ensure-iroh-wasm-toolchain.sh
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
        working-directory: apps/web
      - run: bun run build
      - run: bun run e2e
        working-directory: apps/web
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: failure()
        with:
          name: web-e2e-pr-traces
          path: apps/web/test-results/
          retention-days: 7

  desktop-e2e:
    needs: changes
    if: needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache Iroh WASM cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.cargo/bin
            apps/web/iroh-wasm/target
          key: cargo-iroh-wasm-${{ runner.os }}-${{ hashFiles('apps/web/iroh-wasm/Cargo.lock') }}
          restore-keys: |
            cargo-iroh-wasm-${{ runner.os }}-
      - name: Ensure Iroh WASM toolchain
        run: bash scripts/ci/ensure-iroh-wasm-toolchain.sh
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
        working-directory: apps/desktop
      - run: bun run build
      - run: sudo apt-get update && sudo apt-get install -y gnome-keyring libsecret-1-0 libsecret-tools dbus-x11
      - run: |
          xvfb-run --auto-servernum dbus-run-session -- bash -c '
            rm -rf ~/.local/share/keyrings
            printf "\n" | gnome-keyring-daemon --replace --components=secrets --unlock --foreground &
            sleep 2
            bun run test:e2e
          '
        working-directory: apps/desktop
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        if: failure()
        with:
          name: desktop-e2e-pr-traces
          path: apps/desktop/test-results/
          retention-days: 7

  boot-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache Iroh WASM cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.cargo/bin
            apps/web/iroh-wasm/target
          key: cargo-iroh-wasm-${{ runner.os }}-${{ hashFiles('apps/web/iroh-wasm/Cargo.lock') }}
          restore-keys: |
            cargo-iroh-wasm-${{ runner.os }}-
      - name: Ensure Iroh WASM toolchain
        run: bash scripts/ci/ensure-iroh-wasm-toolchain.sh
      - run: bun install --frozen-lockfile
      - run: bun run build --filter=@centraid/desktop...
      - name: L2 boot-the-artifact structure smoke
        run: node scripts/release/boot-smoke.mjs
