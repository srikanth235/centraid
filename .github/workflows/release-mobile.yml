name: release-mobile

# #501 / J1 / J7 — secret-gated store pipeline scaffold (EAS Build + Submit).
# Human enrollment residual: Expo token, Play upload key, ASC credentials
# (docs/enrollment.md). Never runs `eas update` (J7 store-only routine path).
#
# Default: workflow_dispatch only — does not auto-publish on every desktop tag.

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS profile (preview = TestFlight/Play internal; production = store)'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
      platform:
        description: 'Platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ios
          - android
      submit:
        description: 'Submit to TestFlight / Play internal after build'
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    environment: mobile-release
    outputs:
      enrolled: ${{ steps.enroll.outputs.enrolled }}
    steps:
      - name: Enrollment probe (no secret values)
        id: enroll
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [ -n "${EXPO_TOKEN:-}" ]; then
            echo "enrolled=true" >> "$GITHUB_OUTPUT"
            echo "EXPO_TOKEN present — EAS path enabled"
          else
            echo "enrolled=false" >> "$GITHUB_OUTPUT"
            echo "EXPO_TOKEN absent — scaffold-only (no submit)"
          fi

  # Scaffold path: assembleDebug only (no store submit). Proves tree builds.
  android-assemble-scaffold:
    if: needs.probe.outputs.enrolled != 'true' && (github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android')
    needs: [probe]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      - uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4.7.0
        with:
          distribution: temurin
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2
      - run: bun install --frozen-lockfile
      - name: assembleDebug (scaffold — no release signing)
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug --no-daemon
      - run: echo "Scaffold only. Enroll EXPO_TOKEN + store secrets to enable EAS submit (docs/enrollment.md)."

  eas-build:
    if: needs.probe.outputs.enrolled == 'true'
    needs: [probe]
    runs-on: ubuntu-latest
    environment: mobile-release
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ github.event.inputs.platform == 'all' && fromJSON('["ios","android"]') || fromJSON(format('["{0}"]', github.event.inputs.platform)) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - uses: expo/expo-github-action@04c13d00e429d099d9cffcc5370d54ab38675069 # v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: EAS build (${{ matrix.platform }} / ${{ github.event.inputs.profile }})
        working-directory: apps/mobile
        env:
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
          # Do NOT run eas update — J7 dormant OTA only
        run: |
          eas build --platform "${{ matrix.platform }}" \
            --profile "${{ github.event.inputs.profile }}" \
            --non-interactive \
            --no-wait || eas build --platform "${{ matrix.platform }}" \
            --profile "${{ github.event.inputs.profile }}" \
            --non-interactive
      - name: EAS submit (optional)
        if: github.event.inputs.submit == 'true'
        working-directory: apps/mobile
        run: |
          eas submit --platform "${{ matrix.platform }}" \
            --profile "${{ github.event.inputs.profile }}" \
            --latest \
            --non-interactive
