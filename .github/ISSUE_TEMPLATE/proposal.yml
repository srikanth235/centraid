name: Proposal
description: A fleshed-out change (feature, refactor, or chore) ready for an implementing agent to pick up.
title: 'proposal: <short summary>'
labels: ['proposal']
body:
  - type: markdown
    attributes:
      value: |
        Use this template when a brainstorm has converged on a concrete change. The goal is a handoff an implementing agent (or future you) can act on without re-deriving context.

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why now? What problem or observation prompted this? Link prior issues, PRs, or discussions.
      placeholder: |
        Today, users have to do X manually. We noticed this during Y. Related: #123.
    validations:
      required: true

  - type: textarea
    id: decision
    attributes:
      label: Decision
      description: What did the brainstorming session settle on? Describe the outcome, not the whole transcript.
      placeholder: |
        Add a `governance foo` verb that does Z. Wire it into the skill verb table. Touch:
        - governance/SKILL.md
        - governance/references/VERBS.md
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is in bounds and out of bounds?
      value: |
        In:
        - 

        Out:
        -
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Checklist the implementing agent will ground against. Each item should be independently verifiable at PR review time.
      value: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true

  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: Tests, governance checks, docs, or manual verification that prove completion.
      placeholder: |
        - Unit / integration tests pass
        - Manual check: <what you clicked / ran to confirm>
        - Governance / lint suite green
    validations:
      required: true

  - type: textarea
    id: open-questions
    attributes:
      label: Open questions
      description: Unresolved decisions the implementer should flag before coding. Write "None" if settled.
      placeholder: |
        None.
    validations:
      required: true
