name: Bug
description: Something is broken or behaves unexpectedly.
title: 'bug: <short summary>'
labels: ['bug']
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: Observed behavior, with exact commands / output where relevant.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Repro steps
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, shell, governance-kit version / commit, runtime (Claude Code / Codex / other).
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Hypotheses, suspected root cause, or links to related issues.
