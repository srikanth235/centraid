<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Centraid – Aurora">
  <defs>
    <!-- Soft ambient blobs -->
    <radialGradient id="au-blob-left" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="au-blob-ur" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb7185" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#fb7185" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="au-blob-lr" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="au-blob-hub" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="au-hub" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </radialGradient>
    <filter id="au-blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background: soft off-white / light -->
  <rect width="256" height="256" rx="58" fill="#f8f7ff"/>

  <!-- Aurora blobs -->
  <circle cx="54"  cy="128" r="52" fill="url(#au-blob-left)"/>
  <circle cx="182" cy="74"  r="52" fill="url(#au-blob-ur)"/>
  <circle cx="182" cy="182" r="52" fill="url(#au-blob-lr)"/>
  <circle cx="128" cy="128" r="64" fill="url(#au-blob-hub)"/>

  <!-- Spokes -->
  <line x1="128" y1="128" x2="54"  y2="128" stroke="#9333ea" stroke-width="1.5" opacity="0.3"/>
  <line x1="128" y1="128" x2="182" y2="74"  stroke="#e11d48" stroke-width="1.5" opacity="0.3"/>
  <line x1="128" y1="128" x2="182" y2="182" stroke="#059669" stroke-width="1.5" opacity="0.3"/>

  <!-- Satellites -->
  <circle cx="54"  cy="128" r="14" fill="#fff" opacity="0.9"/>
  <circle cx="54"  cy="128" r="14" fill="#9333ea" opacity="0.25"/>
  <circle cx="54"  cy="128" r="9"  fill="#9333ea"/>

  <circle cx="182" cy="74"  r="14" fill="#fff" opacity="0.9"/>
  <circle cx="182" cy="74"  r="14" fill="#e11d48" opacity="0.25"/>
  <circle cx="182" cy="74"  r="9"  fill="#e11d48"/>

  <circle cx="182" cy="182" r="14" fill="#fff" opacity="0.9"/>
  <circle cx="182" cy="182" r="14" fill="#059669" opacity="0.25"/>
  <circle cx="182" cy="182" r="9"  fill="#059669"/>

  <!-- Hub -->
  <circle cx="128" cy="128" r="30" fill="#fff" opacity="0.8"/>
  <circle cx="128" cy="128" r="26" fill="url(#au-hub)"/>
  <circle cx="122" cy="122" r="5"  fill="#fff" opacity="0.3"/>
</svg>
