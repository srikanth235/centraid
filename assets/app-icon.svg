<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <title>Centraid · App Icon</title>
  <defs>
    <!-- Brand teal tile, subtle top→bottom deepening for depth. -->
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3EC8B4"/>
      <stop offset="1" stop-color="#2AA593"/>
    </linearGradient>
  </defs>

  <!-- Teal tile — white mark on brand teal (WhatsApp-style flat icon). -->
  <rect width="1024" height="1024" fill="url(#tile)"/>

  <!--
    Centraid mark (orbit ring + 3 satellites + hub), white.
    Source viewBox 240×240, mark centered at (120,120). translate(112,112)
    + scale(3.5) puts the mark center at 532,532 (~canvas center) and the
    ~176px envelope across ~205..820 of the 1024 canvas — ~63% optical fill.
  -->
  <g transform="translate(112 112) scale(3.5)">
    <circle cx="120" cy="120" r="80" fill="none" stroke="#ffffff" stroke-width="4.5"/>
    <circle cx="120" cy="40" r="14" fill="#ffffff"/>
    <circle cx="189.28" cy="160" r="14" fill="#ffffff"/>
    <circle cx="50.72" cy="160" r="14" fill="#ffffff"/>
    <circle cx="120" cy="120" r="21" fill="#ffffff"/>
  </g>
</svg>
