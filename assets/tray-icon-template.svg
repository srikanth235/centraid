<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <title>Centraid · macOS menu-bar template</title>
  <!--
    Monochrome template image for the macOS tray (NSStatusItem). Pure black on
    transparent so macOS tints it to match the menu bar (light/dark, active
    highlight) exactly like the Codex / Claude marks. Do NOT add color — a
    template image ignores it and colored tray icons look out of place.

    Same mark as assets/app-icon.svg (orbit ring + 3 satellites + hub), but
    bolded and beaded onto the ring so it stays legible at 16px. Centered in a
    32-unit box (= @2x); rendered to iconTemplate.png (16) + @2x (32).
  -->
  <g fill="#000000">
    <circle cx="16" cy="16" r="10" fill="none" stroke="#000000" stroke-width="2.6"/>
    <circle cx="16" cy="6" r="2.4"/>
    <circle cx="24.66" cy="21" r="2.4"/>
    <circle cx="7.34" cy="21" r="2.4"/>
    <circle cx="16" cy="16" r="3.2"/>
  </g>
</svg>
