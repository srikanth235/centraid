<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <title>Centraid · Android Adaptive Foreground</title>

  <!--
    Android adaptive icons: total canvas 108dp, mask shows inner 72dp (~66.6%),
    safe-zone is inner 66dp (~61%). On 1024px source the safe-zone is ~625px.
    We size the mark at ~470px (46%) so it sits comfortably inside any launcher
    mask (circle, squircle, teardrop) without clipping. White mark on a
    transparent foreground — the teal background layer is supplied by
    `adaptiveIcon.backgroundColor` in apps/mobile/app.json.
  -->
  <g transform="translate(272 272) scale(2)">
    <circle cx="120" cy="120" r="80" fill="none" stroke="#ffffff" stroke-width="4.5"/>
    <circle cx="120" cy="40" r="14" fill="#ffffff"/>
    <circle cx="189.28" cy="160" r="14" fill="#ffffff"/>
    <circle cx="50.72" cy="160" r="14" fill="#ffffff"/>
    <circle cx="120" cy="120" r="21" fill="#ffffff"/>
  </g>
</svg>
