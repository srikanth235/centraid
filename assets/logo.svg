<svg width="340" height="280" viewBox="0 0 340 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="centraidTitle">
  <title id="centraidTitle">Centraid logo</title>
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3EC8B4"/>
      <stop offset="1" stop-color="#2AA593"/>
    </linearGradient>
  </defs>

  <!-- Brand mark: white orbit mark on a brand-teal tile (#3EC8B4 = the
       brand design token), matching the app icon. -->
  <rect x="110" y="30" width="120" height="120" rx="26" ry="26" fill="url(#tile)"/>
  <g transform="translate(170 90) scale(0.41) translate(-120 -120)">
    <circle cx="120" cy="120" r="80" fill="none" stroke="#ffffff" stroke-width="4.5"/>
    <circle cx="120" cy="40" r="14" fill="#ffffff"/>
    <circle cx="189.28" cy="160" r="14" fill="#ffffff"/>
    <circle cx="50.72" cy="160" r="14" fill="#ffffff"/>
    <circle cx="120" cy="120" r="21" fill="#ffffff"/>
  </g>

  <text x="170" y="205" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="600" fill="#1F2430" letter-spacing="1">centraid</text>
  <text x="170" y="230" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#5B6472" letter-spacing="2">YOUR APPS  YOUR DATA  YOUR DEVICES</text>
</svg>
