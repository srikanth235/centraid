<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Centraid">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111318"/>
      <stop offset="100%" stop-color="#090b0e"/>
    </linearGradient>
    <radialGradient id="hub" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6b70f9"/>
      <stop offset="100%" stop-color="#4950F6"/>
    </radialGradient>
  </defs>

  <!-- Container -->
  <rect width="256" height="256" rx="58" fill="url(#bg)"/>

  <!-- Spokes: center → each satellite -->
  <line x1="128" y1="128" x2="54"  y2="128" stroke="#7C5BD9" stroke-width="1.5" opacity="0.35"/>
  <line x1="128" y1="128" x2="182" y2="74"  stroke="#E55772" stroke-width="1.5" opacity="0.35"/>
  <line x1="128" y1="128" x2="182" y2="182" stroke="#2EA098" stroke-width="1.5" opacity="0.35"/>

  <!-- Satellites -->
  <!-- Left (180°) -->
  <circle cx="54"  cy="128" r="15" fill="#7C5BD9"/>
  <!-- Upper-right (45°) -->
  <circle cx="182" cy="74"  r="15" fill="#E55772"/>
  <!-- Lower-right (315°) -->
  <circle cx="182" cy="182" r="15" fill="#2EA098"/>

  <!-- Center hub — larger, brand indigo -->
  <circle cx="128" cy="128" r="10" fill="#4950F6" opacity="0.18"/>
  <circle cx="128" cy="128" r="28" fill="url(#hub)"/>
</svg>
