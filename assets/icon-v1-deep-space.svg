<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Centraid – Deep Space">
  <defs>
    <radialGradient id="ds-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1225"/>
      <stop offset="100%" stop-color="#050810"/>
    </radialGradient>
    <radialGradient id="ds-hub" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#8b8fff"/>
      <stop offset="100%" stop-color="#3a40f0"/>
    </radialGradient>
    <radialGradient id="ds-left" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#a87ef8"/>
      <stop offset="100%" stop-color="#6a3fcc"/>
    </radialGradient>
    <radialGradient id="ds-ur" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ff8fa3"/>
      <stop offset="100%" stop-color="#d13055"/>
    </radialGradient>
    <radialGradient id="ds-lr" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#5de8d8"/>
      <stop offset="100%" stop-color="#1a9e92"/>
    </radialGradient>
    <filter id="ds-glow-hub">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ds-glow-sm">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="58" fill="url(#ds-bg)"/>

  <!-- Stars -->
  <circle cx="40"  cy="32"  r="1"   fill="#fff" opacity="0.5"/>
  <circle cx="72"  cy="55"  r="0.8" fill="#fff" opacity="0.35"/>
  <circle cx="210" cy="40"  r="1.2" fill="#fff" opacity="0.5"/>
  <circle cx="228" cy="80"  r="0.8" fill="#fff" opacity="0.3"/>
  <circle cx="220" cy="210" r="1"   fill="#fff" opacity="0.45"/>
  <circle cx="34"  cy="195" r="1.2" fill="#fff" opacity="0.4"/>
  <circle cx="58"  cy="220" r="0.8" fill="#fff" opacity="0.3"/>
  <circle cx="100" cy="44"  r="0.8" fill="#fff" opacity="0.25"/>
  <circle cx="196" cy="150" r="1"   fill="#fff" opacity="0.35"/>
  <circle cx="44"  cy="155" r="0.8" fill="#fff" opacity="0.25"/>

  <!-- Spokes -->
  <line x1="128" y1="128" x2="54"  y2="128" stroke="#7C5BD9" stroke-width="1"   opacity="0.45" stroke-dasharray="3 4"/>
  <line x1="128" y1="128" x2="182" y2="74"  stroke="#E55772" stroke-width="1"   opacity="0.45" stroke-dasharray="3 4"/>
  <line x1="128" y1="128" x2="182" y2="182" stroke="#2EA098" stroke-width="1"   opacity="0.45" stroke-dasharray="3 4"/>

  <!-- Satellite glow halos -->
  <circle cx="54"  cy="128" r="22" fill="#7C5BD9" opacity="0.12"/>
  <circle cx="182" cy="74"  r="22" fill="#E55772" opacity="0.12"/>
  <circle cx="182" cy="182" r="22" fill="#2EA098" opacity="0.12"/>

  <!-- Satellites -->
  <circle cx="54"  cy="128" r="13" fill="url(#ds-left)" filter="url(#ds-glow-sm)"/>
  <circle cx="182" cy="74"  r="13" fill="url(#ds-ur)"   filter="url(#ds-glow-sm)"/>
  <circle cx="182" cy="182" r="13" fill="url(#ds-lr)"   filter="url(#ds-glow-sm)"/>

  <!-- Hub halo -->
  <circle cx="128" cy="128" r="48" fill="#4950F6" opacity="0.08"/>
  <circle cx="128" cy="128" r="36" fill="#4950F6" opacity="0.12"/>

  <!-- Hub -->
  <circle cx="128" cy="128" r="26" fill="url(#ds-hub)" filter="url(#ds-glow-hub)"/>
</svg>
