<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="Centraid">
  <!-- Centraid mark: white orbit ring + 3 satellites + hub on a brand-teal
       rounded tile (#3EC8B4 = the brand design token). -->
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3EC8B4"/>
      <stop offset="1" stop-color="#2AA593"/>
    </linearGradient>
  </defs>
  <rect width="240" height="240" rx="54" ry="54" fill="url(#tile)"/>
  <g transform="translate(120 120) scale(0.82) translate(-120 -120)">
    <circle cx="120" cy="120" r="80" fill="none" stroke="#ffffff" stroke-width="4.5"/>
    <circle cx="120" cy="40" r="14" fill="#ffffff"/>
    <circle cx="189.28" cy="160" r="14" fill="#ffffff"/>
    <circle cx="50.72" cy="160" r="14" fill="#ffffff"/>
    <circle cx="120" cy="120" r="21" fill="#ffffff"/>
  </g>
</svg>
