[package]
name = "centraid-data-plane"
version = "0.1.0"
edition = "2024"
rust-version = "1.91"
license = "UNLICENSED"
publish = false

[lib]
name = "centraid_data_plane"
path = "src/lib.rs"

[[bin]]
name = "centraid-data-plane"
path = "src/main.rs"

[dependencies]
aes-gcm = "0.10"
anyhow = "1"
axum = "0.8"
base64 = "0.22"
bytes = "1"
clap = { version = "4", features = ["derive", "env"] }
flate2 = "1"
futures-util = "0.3"
hex = "0.4"
hkdf = "0.12"
hmac = "0.12"
http = "1"
image = { version = "0.25", default-features = false, features = ["jpeg", "png"] }
iroh = "1.0.2"
iroh-tickets = "1.0.0"
reqwest = { version = "0.13", default-features = false, features = ["json", "rustls", "stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
subtle = "2"
tokio = { version = "1", features = [
  "fs",
  "io-util",
  "macros",
  "net",
  "rt-multi-thread",
  "signal",
  "sync",
  "time",
] }
tokio-stream = "0.1"
tokio-util = { version = "0.7", features = ["io"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
zstd = "0.13"

[dev-dependencies]
tempfile = "3"

[profile.release]
lto = "thin"
codegen-units = 1
strip = true
