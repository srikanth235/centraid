<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Agenda</title>
    <script>
      // Centraid live settings bridge — see the tasks/notes blueprints for the
      // full story: runtime bakes theme/knobs server-side; this handles the
      // no-bake preview path and live pref flips over postMessage.
      (function () {
        var h = document.documentElement;
        function applyTheme(t, b) {
          if (t === 'dark' || t === 'light') h.dataset.theme = t;
          if (b != null && b !== '') h.style.setProperty('--bg-l', b + '%');
        }
        function applySettings(s) {
          if (s.dataAttrs) {
            for (var k in s.dataAttrs) h.setAttribute('data-' + k, s.dataAttrs[k]);
          }
          if (s.cssVars) {
            for (var k in s.cssVars) h.style.setProperty('--' + k, s.cssVars[k]);
          }
        }
        try {
          var p = new URLSearchParams((location.hash || '').slice(1));
          applyTheme(p.get('theme'), p.get('bgL'));
        } catch (_) {}
        addEventListener('message', function (e) {
          var d = e && e.data;
          if (!d) return;
          if (d.type === 'centraid:settings') applySettings(d);
          else if (d.type === 'centraid:theme') applyTheme(d.theme, d.bgL);
        });
      })();
    </script>
    <link rel="stylesheet" href="wall.css" />
    <link rel="stylesheet" href="tokens.css" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="kit.css" />
  </head>
  <body>
    <div class="ag-shell" id="shell">
      <!-- ░░ SIDEBAR ░░ -->
      <aside class="ag-side" id="sidebar" aria-label="Agenda navigation">
        <div class="ag-brand">
          <span class="ag-brand-mark" aria-hidden="true">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.9"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="5" width="18" height="16" rx="2" />
              <path d="M3 9h18M8 3v4M16 3v4" />
            </svg>
          </span>
          <div class="ag-brand-text">
            <div class="ag-brand-name">Agenda</div>
            <div class="ag-brand-tag">a projection of your vault.</div>
          </div>
          <button type="button" class="kit-icon-btn ag-side-close" id="sideClose" aria-label="Close menu">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
            >
              <path d="M6 6l12 12M18 6 6 18" />
            </svg>
          </button>
        </div>

        <button type="button" class="ag-new" id="createEventBtn">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M12 5v14M5 12h14" />
          </svg>
          <span>Create event</span>
        </button>

        <div id="sidebarMini" aria-live="polite"></div>

        <div class="ag-eyebrow-label ag-cals-label">My calendars</div>
        <div id="sidebarCals"></div>

        <div class="ag-side-foot">
          <div class="ag-consent-line">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 3l7 3v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6z" />
              <path d="m9.5 12 2 2 3.5-3.5" />
            </svg>
            <span>Cancelling parks for the owner &amp; is receipted.</span>
          </div>
        </div>
      </aside>

      <div class="ag-scrim" id="scrim"></div>

      <!-- ░░ MAIN ░░ -->
      <main class="ag-main">
        <div class="ag-topbar">
          <button type="button" class="ag-hamburger" id="hamburger" aria-label="Open menu">
            <svg
              width="19"
              height="19"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
            >
              <path d="M4 7h16M4 12h16M4 17h16" />
            </svg>
          </button>
          <div id="headerBar" class="ag-header-bar"></div>
          <div class="ag-topbar-tools">
            <label class="kit-search ag-search">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.75"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <circle cx="11" cy="11" r="7" />
                <path d="m21 21-4.3-4.3" />
              </svg>
              <input
                id="searchInput"
                type="search"
                placeholder="Search events"
                aria-label="Search events"
                autocomplete="off"
              />
            </label>
            <button type="button" class="kit-icon-btn" id="themeBtn" aria-label="Toggle light/dark"></button>
            <div class="ag-ask-mount" data-ask-mount></div>
          </div>
        </div>

        <div id="consentBanner" class="kit-banner ag-banner" hidden>
          <strong>No vault access yet.</strong>
          <span id="consentDetail"
            >Ask the owner to approve this app's requested scopes in vault settings.</span
          >
        </div>
        <div
          id="noticeBanner"
          class="kit-banner notice ag-banner"
          role="status"
          aria-live="polite"
          hidden
        ></div>

        <div class="ag-canvas" id="canvas"></div>
      </main>

      <div id="drawerRoot"></div>
    </div>

    <div id="modalRoot"></div>

    <!-- One shared file input for the whole app; the drawer's "Attach"
         button sets the target event, then triggers this. -->
    <input id="attachInput" type="file" multiple hidden aria-label="Attach a file to an event" />

    <script>
      // "Ask your vault" config — kit.js injects the button + panel and, by
      // default, drives the conversation through this app's _turn agent;
      // writes park at the vault plane for the owner's approval.
      window.KIT_ASK = {
        scope: 'agenda',
        placeholder: 'Ask your calendar…',
        intro:
          'Ask me to schedule, move, find or explain events. Proposed events show for your approval before they touch the vault.',
        suggest: [
          'Book coffee with Dana Thursday at 10',
          'What’s on this week?',
          'Move the dentist to Friday',
        ],
      };
    </script>
    <script type="module" src="./app.jsx"></script>
  </body>
</html>
