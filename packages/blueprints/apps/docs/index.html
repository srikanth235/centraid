<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Docs</title>
    <script>
      // Centraid live settings bridge — the runtime bakes theme/knobs
      // server-side; this handles the no-bake preview path and live pref
      // flips (theme, accent, font, width, default view) over postMessage.
      (function () {
        var h = document.documentElement;
        function applyTheme(t, b) {
          if (t === 'dark' || t === 'light') h.dataset.theme = t;
          if (b != null && b !== '') h.style.setProperty('--bg-l', b + '%');
        }
        function applySettings(s) {
          if (s.dataAttrs) {
            for (var k in s.dataAttrs) h.setAttribute('data-' + k, s.dataAttrs[k]);
          }
          if (s.cssVars) {
            for (var k in s.cssVars) h.style.setProperty('--' + k, s.cssVars[k]);
          }
        }
        try {
          var p = new URLSearchParams((location.hash || '').slice(1));
          applyTheme(p.get('theme'), p.get('bgL'));
        } catch (_) {}
        addEventListener('message', function (e) {
          var d = e && e.data;
          if (!d) return;
          if (d.type === 'centraid:settings') applySettings(d);
          else if (d.type === 'centraid:theme') applyTheme(d.theme, d.bgL);
        });
      })();
    </script>
    <link rel="stylesheet" href="wall.css" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="kit.css" />
  </head>
  <body>
    <div class="docs" id="root" data-docs-root>
      <!-- ░░ SIDEBAR ░░ -->
      <aside class="d-side" id="sidebar" aria-label="Docs navigation">
        <div class="d-brand">
          <span class="d-brand-mark" aria-hidden="true">
            <svg
              width="17"
              height="17"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.9"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M4 6h5l2 2h9v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1z" />
            </svg>
          </span>
          <div class="d-brand-text">
            <div class="d-brand-name">Docs</div>
            <div class="d-brand-tag">a projection of your vault</div>
          </div>
          <button type="button" class="d-side-close" id="sideClose" aria-label="Close menu">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
            >
              <path d="M6 6l12 12M18 6 6 18" />
            </svg>
          </button>
        </div>

        <div class="d-new-wrap">
          <button
            type="button"
            class="d-new"
            id="newBtn"
            aria-haspopup="menu"
            aria-expanded="false"
          >
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            >
              <path d="M12 5v14M5 12h14" />
            </svg>
            <span>New</span>
            <svg
              class="d-new-chev"
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.9"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="m6 9 6 6 6-6" />
            </svg>
          </button>
          <div class="d-new-menu" id="newMenu" role="menu" hidden></div>
        </div>

        <nav class="d-nav" id="smartNav" aria-label="Views"></nav>

        <div class="d-section-label">Folders</div>
        <div class="d-folders" id="folderList"></div>

        <div class="d-side-foot">
          <div class="d-storage" id="storage"></div>
          <div class="d-consent-line">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 3l7 3v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6z" />
              <path d="m9.5 12 2 2 3.5-3.5" />
            </svg>
            <span>Every write is consent-checked &amp; receipted</span>
          </div>
        </div>
      </aside>

      <div class="d-scrim" id="scrim"></div>

      <!-- ░░ MAIN ░░ -->
      <main class="d-main">
        <div class="d-topbar">
          <button type="button" class="d-hamburger" id="hamburger" aria-label="Open menu">
            <svg
              width="19"
              height="19"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
            >
              <path d="M4 7h16M4 12h16M4 17h16" />
            </svg>
          </button>
          <div class="d-search">
            <svg
              class="d-search-icon"
              width="17"
              height="17"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <circle cx="11" cy="11" r="7" />
              <path d="m21 21-4.3-4.3" />
            </svg>
            <input
              id="searchInput"
              type="search"
              placeholder="Search documents, contents, people…"
              aria-label="Search documents by title or contents"
              autocomplete="off"
            />
          </div>
          <div class="d-topbar-tools">
            <div class="d-viewtoggle" role="group" aria-label="View">
              <button type="button" class="d-viewbtn" id="viewGrid" aria-label="Grid view">
                <svg
                  width="17"
                  height="17"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.75"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect x="3" y="3" width="7" height="7" rx="1" />
                  <rect x="14" y="3" width="7" height="7" rx="1" />
                  <rect x="3" y="14" width="7" height="7" rx="1" />
                  <rect x="14" y="14" width="7" height="7" rx="1" />
                </svg>
              </button>
              <button type="button" class="d-viewbtn" id="viewList" aria-label="List view">
                <svg
                  width="17"
                  height="17"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.75"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" />
                </svg>
              </button>
            </div>
            <button
              type="button"
              class="d-themebtn"
              id="themeBtn"
              aria-label="Toggle light/dark"
            ></button>
            <div class="d-ask-mount" data-ask-mount></div>
          </div>
        </div>

        <div id="consentBanner" class="d-banner" hidden>
          <strong>No vault access yet.</strong>
          <span id="consentDetail"
            >Ask the owner to approve this app's requested scopes in vault settings.</span
          >
        </div>
        <div
          id="noticeBanner"
          class="d-banner notice"
          role="status"
          aria-live="polite"
          hidden
        ></div>

        <div class="d-toolbar">
          <div class="d-toolbar-title">
            <div class="d-title" id="activeTitle">All documents</div>
            <div class="d-sub" id="activeSub"></div>
          </div>
          <div class="d-toolbar-tools">
            <div class="d-chips" id="typeChips" role="group" aria-label="Filter by type"></div>
            <span class="d-toolbar-div" aria-hidden="true"></span>
            <button type="button" class="d-sort" id="sortBtn">
              <svg
                width="15"
                height="15"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.6"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M7 4v16m0 0-3-3m3 3 3-3M17 20V4m0 0-3 3m3-3 3 3" />
              </svg>
              <span id="sortLabel">Date ↓</span>
            </button>
          </div>
        </div>

        <div class="d-bulk" id="bulkBar" role="toolbar" aria-label="Selection actions" hidden></div>

        <div class="d-scroll" id="scroll">
          <div class="d-grid" id="grid" hidden></div>
          <div class="d-listwrap" id="listWrap" hidden>
            <div class="d-list-head" id="listHead" hidden></div>
            <div class="d-list" id="list"></div>
          </div>
          <div class="kit-empty" id="empty" hidden></div>
          <div class="d-window-foot" id="windowFoot" hidden></div>
        </div>
      </main>

      <div id="detailsRoot"></div>
      <div id="quickRoot"></div>
    </div>

    <input id="uploadInput" type="file" multiple hidden aria-hidden="true" />
    <div id="dropOverlay" class="d-drop" hidden aria-hidden="true">
      <div class="d-drop-card"><span id="dropTarget"></span></div>
    </div>

    <script>
      window.KIT_ASK = {
        scope: 'docs',
        placeholder: 'Ask your docs…',
        intro:
          'Ask me to find a file, upload one, or file it away. Writes show for your approval before they touch the vault.',
        suggest: ['Find my lease', 'File the June receipts', 'What did I upload this week?'],
      };
    </script>
    <script type="module" src="app.js"></script>
  </body>
</html>
