<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Tasks</title>
    <script>
      // Centraid live settings bridge — see the docs blueprint for the full
      // story: runtime bakes theme/knobs server-side; this handles the
      // no-bake preview path and live pref flips over postMessage.
      (function () {
        var h = document.documentElement;
        function applyTheme(t, b) {
          if (t === 'dark' || t === 'light') h.dataset.theme = t;
          if (b != null && b !== '') h.style.setProperty('--bg-l', b + '%');
        }
        function applySettings(s) {
          if (s.dataAttrs) {
            for (var k in s.dataAttrs) h.setAttribute('data-' + k, s.dataAttrs[k]);
          }
          if (s.cssVars) {
            for (var k in s.cssVars) h.style.setProperty('--' + k, s.cssVars[k]);
          }
        }
        try {
          var p = new URLSearchParams((location.hash || '').slice(1));
          applyTheme(p.get('theme'), p.get('bgL'));
        } catch (_) {}
        addEventListener('message', function (e) {
          var d = e && e.data;
          if (!d) return;
          if (d.type === 'centraid:settings') applySettings(d);
          else if (d.type === 'centraid:theme') applyTheme(d.theme, d.bgL);
        });
      })();
    </script>
    <link rel="stylesheet" href="wall.css" />
    <link rel="stylesheet" href="tokens.css" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="kit.css" />
  </head>
  <body>
    <div class="tk-shell" id="shell">
      <!-- ░░ SIDEBAR ░░ -->
      <aside class="tk-side" id="sidebar" aria-label="Tasks navigation">
        <div class="tk-brand">
          <span class="tk-brand-mark" aria-hidden="true">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.9"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="6" cy="7" r="3" />
              <path d="m4.5 7 1 1 2-2.4M11 7h9M11 17h9" />
              <circle cx="6" cy="17" r="3" />
            </svg>
          </span>
          <div class="tk-brand-text">
            <div class="tk-brand-name">Tasks</div>
            <div class="tk-brand-tag">a projection of your vault</div>
          </div>
          <button
            type="button"
            class="kit-icon-btn tk-side-close"
            id="sideClose"
            aria-label="Close menu"
          >
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
            >
              <path d="M6 6l12 12M18 6 6 18" />
            </svg>
          </button>
        </div>

        <button type="button" class="tk-new" id="newTaskBtn">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M12 5v14M5 12h14" />
          </svg>
          <span>New task</span>
        </button>

        <nav class="tk-nav" id="sidebarNav" aria-label="Focus views"></nav>

        <div class="tk-side-foot" id="sidebarFoot"></div>
      </aside>

      <div class="tk-scrim" id="scrim"></div>

      <!-- ░░ MAIN ░░ -->
      <main class="tk-main">
        <div class="tk-topbar">
          <button type="button" class="tk-hamburger" id="hamburger" aria-label="Open menu">
            <svg
              width="19"
              height="19"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
            >
              <path d="M4 7h16M4 12h16M4 17h16" />
            </svg>
          </button>
          <div class="tk-heading">
            <div class="tk-title" id="activeTitle">Today</div>
            <div class="tk-sub" id="activeSub"></div>
          </div>
          <div class="tk-topbar-tools">
            <label class="kit-search tk-search">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.75"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <circle cx="11" cy="11" r="7" />
                <path d="m21 21-4.3-4.3" />
              </svg>
              <input
                id="searchInput"
                type="search"
                placeholder="Find tasks ( / )"
                aria-label="Search tasks"
                autocomplete="off"
              />
            </label>
            <button
              type="button"
              class="kit-icon-btn"
              id="themeBtn"
              aria-label="Toggle light/dark"
            ></button>
            <div class="tk-ask-mount" data-ask-mount></div>
          </div>
        </div>

        <div id="consentBanner" class="kit-banner tk-banner" hidden>
          <strong>No vault access yet.</strong>
          <span id="consentDetail"
            >Ask the owner to approve this app's requested scopes in vault settings.</span
          >
        </div>
        <div
          id="noticeBanner"
          class="kit-banner notice tk-banner"
          role="status"
          aria-live="polite"
          hidden
        ></div>

        <div class="tk-scroll" id="scroll">
          <div id="board" aria-label="Tasks"></div>
        </div>
      </main>

      <div id="detailRoot"></div>
    </div>

    <!-- One shared file input for the whole app; the detail drawer's "Attach
         a file" button sets the target task, then triggers this. -->
    <input id="attachInput" type="file" multiple hidden aria-label="Attach a file to a task" />

    <script>
      // "Ask your vault" config — kit.js injects the button + panel and, by
      // default, drives the conversation through this app's _turn agent;
      // writes park at the vault plane for the owner's approval.
      window.KIT_ASK = {
        scope: 'tasks',
        placeholder: 'Ask your tasks…',
        intro:
          'Ask me to add, complete, reschedule or find tasks. I’ll show the change for your approval before it touches the vault.',
        suggest: [
          'Add “call mom tomorrow”',
          'What’s due today?',
          'Complete “Send the studio invoice”',
        ],
      };
    </script>
    <script type="module" src="./app.tsx"></script>
  </body>
</html>
