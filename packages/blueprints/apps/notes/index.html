<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Notes</title>
    <script>
      // Centraid live settings bridge — see the todos blueprint for the
      // full story: runtime bakes theme server-side; this handles the
      // no-bake preview path and live pref flips over postMessage.
      (function () {
        var h = document.documentElement;
        function applyTheme(t, b) {
          if (t === 'dark' || t === 'light') h.dataset.theme = t;
          if (b != null && b !== '') h.style.setProperty('--bg-l', b + '%');
        }
        function applySettings(s) {
          if (s.dataAttrs) {
            for (var k in s.dataAttrs) h.setAttribute('data-' + k, s.dataAttrs[k]);
          }
          if (s.cssVars) {
            for (var k in s.cssVars) h.style.setProperty('--' + k, s.cssVars[k]);
          }
        }
        try {
          var p = new URLSearchParams((location.hash || '').slice(1));
          applyTheme(p.get('theme'), p.get('bgL'));
        } catch (_) {}
        addEventListener('message', function (e) {
          var d = e && e.data;
          if (!d) return;
          if (d.type === 'centraid:settings') applySettings(d);
          else if (d.type === 'centraid:theme') applyTheme(d.theme, d.bgL);
        });
      })();
    </script>
    <link rel="stylesheet" href="wall.css" />
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <main>
      <header class="head">
        <div>
          <h1>Notes</h1>
          <p id="subtitle" class="muted">A read-only projection of your vault.</p>
        </div>
      </header>

      <div id="consentBanner" class="banner" hidden>
        <strong>No vault access yet.</strong>
        <span id="consentDetail"
          >Ask the owner to approve this app's requested scopes in vault settings.</span
        >
      </div>

      <div id="notebookChips" class="chips" role="group" aria-label="Filter by notebook"></div>

      <section id="noteList" aria-label="Notes"></section>

      <section id="noteView" aria-label="Note" hidden>
        <button id="backButton" type="button" class="back">← All notes</button>
        <h2 id="noteTitle" class="note-view-title"></h2>
        <p id="noteMeta" class="muted small"></p>
        <div id="noteBody" class="note-body"></div>
      </section>

      <p id="empty" class="empty" hidden>No notes yet. Notes arrive through the vault's ingest.</p>

      <p class="muted small footnote">
        Read-only for now — editing arrives with the knowledge domain's command pack.
      </p>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
