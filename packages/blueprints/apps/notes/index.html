<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Notes</title>
    <script>
      // Centraid live settings bridge — see the todos blueprint for the
      // full story: runtime bakes theme server-side; this handles the
      // no-bake preview path and live pref flips over postMessage.
      (function () {
        var h = document.documentElement;
        function applyTheme(t, b) {
          if (t === 'dark' || t === 'light') h.dataset.theme = t;
          if (b != null && b !== '') h.style.setProperty('--bg-l', b + '%');
        }
        function applySettings(s) {
          if (s.dataAttrs) {
            for (var k in s.dataAttrs) h.setAttribute('data-' + k, s.dataAttrs[k]);
          }
          if (s.cssVars) {
            for (var k in s.cssVars) h.style.setProperty('--' + k, s.cssVars[k]);
          }
        }
        try {
          var p = new URLSearchParams((location.hash || '').slice(1));
          applyTheme(p.get('theme'), p.get('bgL'));
        } catch (_) {}
        addEventListener('message', function (e) {
          var d = e && e.data;
          if (!d) return;
          if (d.type === 'centraid:settings') applySettings(d);
          else if (d.type === 'centraid:theme') applyTheme(d.theme, d.bgL);
        });
      })();
    </script>
    <link rel="stylesheet" href="wall.css" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="kit.css" />
  </head>
  <body>
    <main>
      <header class="head">
        <div>
          <h1>Notes</h1>
          <p id="subtitle" class="muted">A projection of your vault — nothing stored here.</p>
        </div>
      </header>

      <div id="consentBanner" class="banner" hidden>
        <strong>No vault access yet.</strong>
        <span id="consentDetail"
          >Ask the owner to approve this app's requested scopes in vault settings.</span
        >
      </div>
      <div id="noticeBanner" class="banner notice" role="status" aria-live="polite" hidden></div>

      <div id="notebookChips" class="chips" role="group" aria-label="Filter by notebook"></div>

      <form id="notebookForm" class="inline-form" autocomplete="off" hidden>
        <input
          id="notebookNameInput"
          type="text"
          placeholder="Notebook name…"
          aria-label="Notebook name"
        />
        <button type="submit" class="primary small-btn">Create</button>
        <button type="button" id="cancelNotebook" class="ghost">Cancel</button>
      </form>

      <form id="quickAdd" autocomplete="off">
        <input id="titleInput" type="text" placeholder="New note title…" aria-label="Note title" />
        <div id="quickAddMore" hidden>
          <textarea
            id="bodyInput"
            rows="4"
            placeholder="Write your note…"
            aria-label="Note body"
          ></textarea>
          <div class="quick-add-actions">
            <span id="quickAddTarget" class="muted small"></span>
            <button type="button" id="cancelAdd" class="ghost">Cancel</button>
            <button type="submit" class="primary small-btn">Add note</button>
          </div>
        </div>
      </form>

      <section id="noteList" aria-label="Notes"></section>

      <section id="noteView" aria-label="Note" hidden>
        <div class="note-view-bar">
          <button id="backButton" type="button" class="back">← All notes</button>
          <span class="note-view-actions">
            <button id="pinButton" type="button" class="ghost"></button>
            <select id="moveSelect" aria-label="Notebook"></select>
            <button id="editButton" type="button" class="ghost">Edit</button>
            <button id="deleteButton" type="button" class="ghost danger">Delete</button>
          </span>
        </div>
        <h2 id="noteTitle" class="note-view-title"></h2>
        <p id="noteMeta" class="muted small"></p>
        <div id="noteBody" class="note-body"></div>
        <div id="attachBlock" class="attach-block">
          <div id="attachStrip" class="attach-strip"></div>
          <label class="attach-add">
            <input id="attachInput" type="file" multiple hidden />
            <span class="ghost small-btn">＋ Attach file</span>
          </label>
        </div>
        <form id="editForm" autocomplete="off" hidden>
          <input id="editTitleInput" type="text" aria-label="Note title" />
          <textarea id="editBodyInput" rows="8" aria-label="Note body"></textarea>
          <div class="quick-add-actions">
            <button type="button" id="cancelEdit" class="ghost">Cancel</button>
            <button type="submit" class="primary small-btn">Save</button>
          </div>
        </form>
      </section>

      <p id="empty" class="empty" hidden>No notes yet. Write the first one above.</p>

      <p class="muted small footnote">
        Every write is a typed vault command — consent-checked and receipted.
      </p>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
