<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Tally</title>
    <script>
      // Centraid live settings bridge — the runtime bakes theme/knobs
      // server-side; this handles the no-bake preview path and live pref
      // flips (theme, accent, font, width, default view) over postMessage.
      (function () {
        var h = document.documentElement;
        function applyTheme(t, b) {
          if (t === 'dark' || t === 'light') h.dataset.theme = t;
          if (b != null && b !== '') h.style.setProperty('--bg-l', b + '%');
        }
        function applySettings(s) {
          if (s.dataAttrs) {
            for (var k in s.dataAttrs) h.setAttribute('data-' + k, s.dataAttrs[k]);
          }
          if (s.cssVars) {
            for (var k in s.cssVars) h.style.setProperty('--' + k, s.cssVars[k]);
          }
        }
        try {
          var p = new URLSearchParams((location.hash || '').slice(1));
          applyTheme(p.get('theme'), p.get('bgL'));
        } catch (_) {}
        addEventListener('message', function (e) {
          var d = e && e.data;
          if (!d) return;
          if (d.type === 'centraid:settings') applySettings(d);
          else if (d.type === 'centraid:theme') applyTheme(d.theme, d.bgL);
        });
      })();
    </script>
    <link rel="stylesheet" href="wall.css" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="kit.css" />
  </head>
  <body>
    <div class="tally" id="root" data-tally-root>
      <!-- ░░ SIDEBAR ░░ -->
      <aside class="s-side" id="sidebar" aria-label="Tally navigation">
        <div class="s-brand">
          <span class="s-brand-mark" aria-hidden="true">
            <svg
              width="17"
              height="17"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.9"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M4 7h16M4 12h16M4 17h10" />
              <circle cx="18" cy="17" r="3" />
            </svg>
          </span>
          <div style="min-width: 0">
            <div class="s-brand-name">Tally</div>
            <div class="s-brand-tag">split, settled</div>
          </div>
          <button type="button" class="s-side-close" id="sideClose" aria-label="Close menu">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
            >
              <path d="M6 6l12 12M18 6 6 18" />
            </svg>
          </button>
        </div>

        <button type="button" class="s-add" id="addExpenseBtn">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <path d="M12 5v14M5 12h14" />
          </svg>
          Add an expense
        </button>

        <nav class="s-nav" id="smartNav" aria-label="Views"></nav>

        <div class="s-seclabel">
          <span>Groups</span>
          <button type="button" id="newGroupBtn" aria-label="New group">
            <svg
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.9"
              stroke-linecap="round"
            >
              <path d="M12 5v14M5 12h14" />
            </svg>
          </button>
        </div>
        <div class="s-nav" id="groupsNav"></div>

        <div class="s-seclabel">
          <span>Friends</span>
          <button type="button" id="addFriendBtn" aria-label="Add friend">
            <svg
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.9"
              stroke-linecap="round"
            >
              <path d="M12 5v14M5 12h14" />
            </svg>
          </button>
        </div>
        <div class="s-nav" id="friendsNav"></div>

        <div class="s-side-foot">
          <div class="s-consent">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 3l7 3v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6z" />
              <path d="m9.5 12 2 2 3.5-3.5" />
            </svg>
            <span>Every write is consent-checked &amp; receipted</span>
          </div>
        </div>
      </aside>

      <div class="s-scrim" id="scrim"></div>

      <!-- ░░ MAIN ░░ -->
      <main class="s-main">
        <div class="s-topbar">
          <button type="button" class="s-hamburger" id="hamburger" aria-label="Open menu">
            <svg
              width="19"
              height="19"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
            >
              <path d="M4 7h16M4 12h16M4 17h16" />
            </svg>
          </button>
          <div class="s-head">
            <span class="s-head-av" id="headAv" hidden></span>
            <div style="min-width: 0">
              <div class="s-title" id="activeTitle">Dashboard</div>
              <div class="s-sub" id="activeSub"></div>
            </div>
          </div>
          <div class="s-tools">
            <div class="s-search">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.75"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <circle cx="11" cy="11" r="7" />
                <path d="m21 21-4.3-4.3" />
              </svg>
              <input
                id="searchInput"
                type="search"
                placeholder="Search expenses"
                aria-label="Search expenses by description"
                autocomplete="off"
              />
            </div>
            <button type="button" class="kit-btn" id="settleBtn" hidden>Settle up</button>
            <button
              type="button"
              class="s-iconbtn"
              id="themeBtn"
              aria-label="Toggle light/dark"
            ></button>
            <div class="s-ask-mount" data-ask-mount></div>
          </div>
        </div>

        <div id="consentBanner" class="s-banner" hidden>
          <strong>No vault access yet.</strong>
          <span id="consentDetail"
            >Ask the owner to approve this app's requested scopes in vault settings.</span
          >
        </div>
        <div
          id="noticeBanner"
          class="s-banner notice"
          role="status"
          aria-live="polite"
          hidden
        ></div>

        <div class="s-scroll" id="scroll">
          <div class="s-wrap" id="wrap"></div>
        </div>
      </main>

      <div id="modalRoot"></div>
    </div>

    <script>
      window.KIT_ASK = {
        scope: 'tally',
        placeholder: 'Ask about your expenses…',
        intro:
          'Ask me to add an expense, settle up, or see who owes whom. Writes show for your approval before they touch the vault.',
        suggest: ['Split dinner four ways', 'Who do I owe?', 'Settle up with Alex'],
      };
    </script>
    <script type="module" src="app.js"></script>
  </body>
</html>
