<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Photos</title>
    <script>
      // Centraid live settings bridge — see the todos blueprint for the
      // full story: runtime bakes theme server-side; this handles the
      // no-bake preview path and live pref flips over postMessage.
      (function () {
        var h = document.documentElement;
        function applyTheme(t, b) {
          if (t === 'dark' || t === 'light') h.dataset.theme = t;
          if (b != null && b !== '') h.style.setProperty('--bg-l', b + '%');
        }
        function applySettings(s) {
          if (s.dataAttrs) {
            for (var k in s.dataAttrs) h.setAttribute('data-' + k, s.dataAttrs[k]);
          }
          if (s.cssVars) {
            for (var k in s.cssVars) h.style.setProperty('--' + k, s.cssVars[k]);
          }
        }
        try {
          var p = new URLSearchParams((location.hash || '').slice(1));
          applyTheme(p.get('theme'), p.get('bgL'));
        } catch (_) {}
        addEventListener('message', function (e) {
          var d = e && e.data;
          if (!d) return;
          if (d.type === 'centraid:settings') applySettings(d);
          else if (d.type === 'centraid:theme') applyTheme(d.theme, d.bgL);
        });
      })();
    </script>
    <link rel="stylesheet" href="wall.css" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="kit.css" />
  </head>
  <body>
    <main>
      <header class="head" data-ask-mount>
        <h1>Photos</h1>
        <div class="search" role="search">
          <span class="search-icon" aria-hidden="true">⌕</span>
          <input
            id="searchInput"
            type="search"
            placeholder="Search photos"
            aria-label="Search photos"
            autocomplete="off"
          />
          <button
            id="searchClear"
            type="button"
            class="search-clear"
            aria-label="Clear search"
            hidden
          >
            ×
          </button>
        </div>
        <button id="selectBtn" type="button" class="kit-btn head-btn">Select</button>
        <button id="uploadBtn" type="button" class="kit-btn primary">＋ Add photos</button>
      </header>

      <div id="consentBanner" class="kit-banner" hidden>
        <strong>No vault access yet.</strong>
        <span id="consentDetail"
          >Ask the owner to approve this app's requested scopes in vault settings.</span
        >
      </div>
      <div
        id="noticeBanner"
        class="kit-banner notice"
        role="status"
        aria-live="polite"
        hidden
      ></div>

      <div id="live">
        <div class="split">
          <nav id="sideNav" class="side-nav" aria-label="Albums" hidden>
            <div
              id="albumChips"
              class="chips"
              role="group"
              aria-label="Filter by album"
              hidden
            ></div>
            <div id="albumTools" class="album-tools" hidden></div>
          </nav>

          <div class="pane">
            <section id="grid" class="grid" aria-label="Photo library"></section>
            <div id="empty" class="empty" hidden>
              <p id="emptyText">No photos yet — your library starts with the first upload.</p>
              <button id="emptyUpload" type="button" class="kit-btn primary">＋ Add photos</button>
            </div>
          </div>
        </div>
      </div>

      <input
        id="fileInput"
        type="file"
        accept="image/*,video/*"
        multiple
        hidden
        aria-hidden="true"
      />

      <p class="muted small footnote">
        Every change is a typed media command — consent-checked and receipted.
      </p>

      <div id="lightbox" class="lightbox" hidden></div>
      <div
        id="selectionBar"
        class="selection-bar"
        role="toolbar"
        aria-label="Selection actions"
        hidden
      ></div>
      <div
        id="picker"
        class="kit-modal-back"
        role="dialog"
        aria-label="Add photos to album"
        hidden
      ></div>
      <div id="dropOverlay" class="drop-overlay" aria-hidden="true" hidden>
        <div class="drop-card">Drop to add to your library</div>
      </div>
    </main>
    <script>
      window.KIT_ASK = {
        scope: 'photos',
        placeholder: 'Ask your photos…',
        intro:
          'Ask me to find photos, make an album, or share a set. Albums and shares show for your approval before they touch the vault.',
        suggest: [
          'Make an album of Saturday’s photos',
          'Find beach photos',
          'Share these with Dana',
        ],
      };
    </script>
    <script type="module" src="./app.jsx"></script>
  </body>
</html>
