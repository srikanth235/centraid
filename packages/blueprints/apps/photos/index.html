<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Photos</title>
    <script>
      // Centraid live settings bridge — see the todos blueprint for the
      // full story: runtime bakes theme server-side; this handles the
      // no-bake preview path and live pref flips over postMessage.
      (function () {
        var h = document.documentElement;
        function applyTheme(t, b) {
          if (t === 'dark' || t === 'light') h.dataset.theme = t;
          if (b != null && b !== '') h.style.setProperty('--bg-l', b + '%');
        }
        function applySettings(s) {
          if (s.dataAttrs) {
            for (var k in s.dataAttrs) h.setAttribute('data-' + k, s.dataAttrs[k]);
          }
          if (s.cssVars) {
            for (var k in s.cssVars) h.style.setProperty('--' + k, s.cssVars[k]);
          }
        }
        try {
          var p = new URLSearchParams((location.hash || '').slice(1));
          applyTheme(p.get('theme'), p.get('bgL'));
        } catch (_) {}
        addEventListener('message', function (e) {
          var d = e && e.data;
          if (!d) return;
          if (d.type === 'centraid:settings') applySettings(d);
          else if (d.type === 'centraid:theme') applyTheme(d.theme, d.bgL);
        });
      })();
    </script>
    <link rel="stylesheet" href="wall.css" />
    <link rel="stylesheet" href="tokens.css" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="kit.css" />
  </head>
  <body>
    <div class="ph-app">
      <div id="sidebarMount"></div>

      <main class="ph-main">
        <div class="ph-header">
          <button
            id="hamburgerBtn"
            type="button"
            class="ph-header-icon-btn ph-hamburger"
            aria-label="Menu"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
            >
              <path d="M4 7h16M4 12h16M4 17h16" />
            </svg>
          </button>
          <label class="kit-search ph-search" role="search">
            <svg
              aria-hidden="true"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="11" cy="11" r="7" />
              <path d="m21 21-4.3-4.3" />
            </svg>
            <input
              id="searchInput"
              type="search"
              placeholder="Search people, places, things — try “beach” or “Dana”"
              aria-label="Search photos"
              autocomplete="off"
            />
            <button
              id="searchClear"
              type="button"
              class="kit-icon-btn"
              aria-label="Clear search"
              hidden
            >
              ×
            </button>
          </label>
          <div class="ph-header-actions">
            <div class="ph-zoom" role="group" aria-label="Zoom">
              <button
                id="zoomOutBtn"
                type="button"
                class="ph-header-icon-btn"
                aria-label="Smaller tiles"
              >
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.75"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect x="3" y="3" width="7" height="7" rx="1" />
                  <rect x="14" y="3" width="7" height="7" rx="1" />
                  <rect x="3" y="14" width="7" height="7" rx="1" />
                  <rect x="14" y="14" width="7" height="7" rx="1" />
                </svg>
              </button>
              <button
                id="zoomInBtn"
                type="button"
                class="ph-header-icon-btn"
                aria-label="Larger tiles"
              >
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.75"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect x="3" y="3" width="8" height="8" rx="1" />
                  <rect x="13" y="13" width="8" height="8" rx="1" />
                </svg>
              </button>
            </div>
            <!-- Face-proposer on-demand (issue #352): a self-contained React
                 region (components/Enrichment.jsx), mounted once at boot. -->
            <div id="enrichmentMount"></div>
            <!-- Desktop-only toolbar entry point for the slideshow (issue #352) —
                 CSS-gated to >=720px so the mobile header is untouched; the
                 lightbox's own Slideshow icon covers every width. -->
            <button
              id="slideshowBtn"
              type="button"
              class="ph-header-icon-btn slideshow-toolbar-btn"
              aria-label="Slideshow"
            >
              <svg viewBox="0 0 24 24" fill="currentColor" stroke="none">
                <path d="M8 5v14l11-7z" />
              </svg>
            </button>
            <div class="ph-ask-mount" data-ask-mount></div>
          </div>
        </div>

        <div id="consentBanner" class="kit-banner" hidden>
          <strong>No vault access yet.</strong>
          <span id="consentDetail"
            >Ask the owner to approve this app's requested scopes in vault settings.</span
          >
        </div>
        <div
          id="noticeBanner"
          class="kit-banner notice"
          role="status"
          aria-live="polite"
          hidden
        ></div>

        <div id="live">
          <div id="toolbarMount"></div>
          <div
            id="selectionBar"
            class="selection-bar"
            role="toolbar"
            aria-label="Selection actions"
            hidden
          ></div>

          <div id="scrollPane" class="ph-scroll">
            <section id="grid" class="ph-content" aria-label="Photo library"></section>
            <div id="empty" class="kit-empty" hidden>
              <div id="emptyText" class="kit-empty-title"></div>
              <div class="kit-empty-sub">
                <button id="emptyUpload" type="button" class="kit-btn primary" hidden>
                  ＋ Add media
                </button>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <input
      id="fileInput"
      type="file"
      accept="image/*,video/*,audio/*"
      multiple
      hidden
      aria-hidden="true"
    />

    <div id="lightbox" class="lightbox" hidden></div>
    <div
      id="slideshow"
      class="slideshow"
      role="dialog"
      aria-modal="true"
      aria-label="Slideshow"
      hidden
    ></div>
    <div
      id="picker"
      class="kit-modal-back"
      role="dialog"
      aria-label="Add photos to album"
      hidden
    ></div>
    <div id="dropOverlay" class="kit-drop" aria-hidden="true" hidden>
      <div class="kit-drop-card">Drop to add to your library</div>
    </div>
    <script>
      window.KIT_ASK = {
        scope: 'photos',
        placeholder: 'Ask your photos…',
        intro:
          'Ask me to find photos, make an album, or share a set. Albums and shares show for your approval before they touch the vault.',
        suggest: [
          'Make an album of Saturday’s photos',
          'Find beach photos',
          'Share these with Dana',
        ],
      };
    </script>
    <script type="module" src="./app.jsx"></script>
  </body>
</html>
