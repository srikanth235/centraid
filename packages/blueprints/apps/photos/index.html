<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Photos</title>
    <script>
      // Centraid live settings bridge — see the todos blueprint for the
      // full story: runtime bakes theme server-side; this handles the
      // no-bake preview path and live pref flips over postMessage.
      (function () {
        var h = document.documentElement;
        function applyTheme(t, b) {
          if (t === 'dark' || t === 'light') h.dataset.theme = t;
          if (b != null && b !== '') h.style.setProperty('--bg-l', b + '%');
        }
        function applySettings(s) {
          if (s.dataAttrs) {
            for (var k in s.dataAttrs) h.setAttribute('data-' + k, s.dataAttrs[k]);
          }
          if (s.cssVars) {
            for (var k in s.cssVars) h.style.setProperty('--' + k, s.cssVars[k]);
          }
        }
        try {
          var p = new URLSearchParams((location.hash || '').slice(1));
          applyTheme(p.get('theme'), p.get('bgL'));
        } catch (_) {}
        addEventListener('message', function (e) {
          var d = e && e.data;
          if (!d) return;
          if (d.type === 'centraid:settings') applySettings(d);
          else if (d.type === 'centraid:theme') applyTheme(d.theme, d.bgL);
        });
      })();
    </script>
    <link rel="stylesheet" href="wall.css" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="kit.css" />
  </head>
  <body>
    <main>
      <header class="head">
        <div>
          <h1>Photos</h1>
          <p id="subtitle" class="muted">A projection of your vault — nothing stored here.</p>
        </div>
        <button id="uploadBtn" type="button" class="primary small-btn">＋ Add photos</button>
      </header>

      <div id="consentBanner" class="banner" hidden>
        <strong>No vault access yet.</strong>
        <span id="consentDetail"
          >Ask the owner to approve this app's requested scopes in vault settings.</span
        >
      </div>
      <div id="noticeBanner" class="banner notice" role="status" aria-live="polite" hidden></div>

      <div id="live">
        <nav id="albumChips" class="chips" aria-label="Albums" hidden></nav>
        <div id="albumTools" class="album-tools" hidden></div>

        <section id="grid" class="grid" aria-label="Photo library"></section>
        <div id="empty" class="empty" hidden>
          <p id="emptyText">No photos yet — your library starts with the first upload.</p>
          <button id="emptyUpload" type="button" class="primary small-btn">＋ Add photos</button>
        </div>
      </div>

      <input
        id="fileInput"
        type="file"
        accept="image/*,video/*"
        multiple
        hidden
        aria-hidden="true"
      />

      <p class="muted small footnote">
        Every change is a typed media command — consent-checked and receipted.
      </p>

      <div id="lightbox" class="lightbox" hidden></div>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
