<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Todos</title>
    <script src="theme-bridge.js"></script>
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <main>
      <header class="head">
        <div>
          <h1>Todos</h1>
          <p id="openCount" class="muted">0 open</p>
        </div>
      </header>

      <form id="addForm" class="add-bar" autocomplete="off">
        <input
          id="addInput"
          type="text"
          name="text"
          placeholder="Add something to do…"
          enterkeyhint="done"
          autocapitalize="sentences"
        />
        <button id="addBtn" type="submit" class="primary">Add</button>
      </form>

      <section id="openList" class="list" aria-label="Open todos"></section>
      <section id="doneSection" class="done-section" hidden>
        <p id="doneLabel" class="muted small">Done</p>
        <div id="doneList" class="list" aria-label="Done todos"></div>
      </section>

      <p id="empty" class="empty" hidden>Nothing on your list. Add one above.</p>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
