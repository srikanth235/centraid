apply plugin: 'com.android.library'
apply plugin: 'expo-module-gradle-plugin'

group = 'expo.modules.centraidtunnel'
version = '0.1.0'

android {
  namespace 'expo.modules.centraidtunnel'
  defaultConfig {
    // minSdk/compileSdk come from the app via the expo module plugin
    // (Expo SDK 54 defaults: minSdk 24, compileSdk 36).
    versionCode 1
    versionName '0.1.0'
  }
}

dependencies {
  implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.9.0'

  // Iroh Kotlin binding (uniffi-generated from n0-computer/iroh-ffi 1.0.0).
  // Vendored locally rather than pulled from Maven: the generated bindings
  // live in src/main/java/computer/iroh/ (iroh_ffi.kt + IrohAndroid.kt) and
  // the cross-compiled native library in src/main/jniLibs/<abi>/libiroh_ffi.so.
  // TunnelWire.kt is the only file that touches the binding's API surface.
  // Regenerate via: cargo ndk -t <abi> build --lib --release  +
  //   cargo run --bin uniffi-bindgen generate --language kotlin --library <so>
  implementation 'net.java.dev.jna:jna:5.15.0@aar'
  implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-core:1.9.0'
}
