apply plugin: 'com.android.library'
apply plugin: 'expo-module-gradle-plugin'

group = 'expo.modules.centraidtunnel'
version = '0.1.0'

android {
  namespace 'expo.modules.centraidtunnel'
  defaultConfig {
    // minSdk/compileSdk come from the app via the expo module plugin
    // (Expo SDK 54 defaults: minSdk 24, compileSdk 36).
    versionCode 1
    versionName '0.1.0'
  }
}

dependencies {
  implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.9.0'

  // Iroh Kotlin binding (uniffi-generated from n0-computer/iroh-ffi 1.0).
  // Uncomment once the artifact (or a locally vendored AAR) is wired into
  // the repo's repositories; TunnelWire.kt is the only file that touches
  // its API surface.
  // implementation 'computer.iroh:iroh:1.0.0'
}
