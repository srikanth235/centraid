<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#111317" />
    <title>Centraid — offline</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif;
        background: #111317;
        color: #e8e9ec;
      }
      main {
        max-width: 28rem;
        text-align: center;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.25rem;
        font-weight: 600;
      }
      p {
        margin: 0;
        line-height: 1.5;
        color: #a8adb8;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You’re offline</h1>
      <p>
        Centraid can’t reach your gateway right now. Check your connection and try again — your
        local shell will reconnect automatically when the network returns.
      </p>
    </main>
  </body>
</html>
