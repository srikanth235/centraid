# gateway-engine-mode-agnostic - app-engine may not branch on gateway mode.
category: Architecture
recommended: true
summary: |
  Code under packages/app-engine/ may not branch on which gateway mode
  it is running under (embedded inside the desktop app's main process vs
  OpenClaw plugin). Mode-specific behavior belongs at entrypoints:
  apps/desktop/src/main/ for embedded, packages/openclaw-plugin/src/ for
  OpenClaw. The architecture's "same code, two modes" property depends
  on app-engine staying mode-agnostic.
surface: repo-state
hook: pre-commit
