# agent-steering-accounting — Human-steering events for the change set are recorded by a fresh-context sub-agent in the receipt's ## Steering section (rows under ## Accounting → ### Steering); the hook gates presence + verdict + ledger shape.
category: AgentDiscipline
recommended: true
always_install: true
summary: Per-issue steering ledger (interrupts and corrections) recorded by a fresh-context sub-agent handed the session transcript. The `## Steering` attestation is gated for presence + PASS/REFUTED verdict; the rows under `## Accounting` → `### Steering` are validated for shape (validate-dir). No `claude -p` / network call on the commit path (issue #325).
surface: change-set
hook: pre-commit
# Sub-agent judgment (issue #325): steering classification IS an LLM judgment, so
# it is folded into a fresh-context sub-agent attestation instead of an in-hook
# `claude -p` classifier (which polluted the transcript dir and made the commit
# hook non-deterministic / online). Declared once here; check.sh gates it via
# subagent_attest, and the shared orchestrator batches it (isolation: shared)
# with receipt-per-issue's `## Audit` into one sub-agent per commit — handed the
# transcript, the sub-agent records every steering event AND renders the verdict.
subagent:
  inputs:  [transcript, receipt]
  checks:
    - "every human-steering event in the session transcript (an interrupt, or a user message that redirects/corrects the agent mid-task) is recorded as a row in this receipt's '### Steering' table under '## Accounting' — append rows with `python3 .governance/packs/governance-kit/audit/directives/agent-steering-accounting/lib/ledger.py append-row <receipt> <steer-key> <session> <issue> <type> <tier> <user-reason> <commit> <ordinal> <timestamp>` (type ∈ interrupt|correction, tier=structural for interrupts / classifier for corrections); see the directive README for the schema"
    - "no non-steering message is recorded as a steering event (tool denials and ordinary task messages are NOT steering)"
  isolation: shared
  section: Steering
  tiers: { attest: low, sweep: high }
reads:
  - receipts/*.md
writes:
  - receipts/*.md
