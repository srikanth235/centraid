# Operator-tunable knobs for agent-steering-accounting's `## Steering`
# sub-agent attestation (issue #331). These are the OPERATIONAL half of the
# directive.yaml `subagent:` block — pure cost / batching dials you may override
# per-repo via the overlay at
# `.governance/conf/governance-kit/audit/agent-steering-accounting.conf`. The
# SEMANTIC half (inputs, checks, section) stays author-fixed in directive.yaml:
# editing the vendored directive.yaml trips managed-tree-integrity by design,
# because the sweep lane re-derives the verdict against exactly those fields.
#
# Pack-owned and live — `governance pack update` refreshes this file. Do not
# hand-edit it; write your overrides in the overlay above. Resolution precedence
# (conf_get): env GOVERNANCE_<KEY> > overlay row > this defaults row > the
# directive.yaml value. Until you write an overlay row, behavior is identical to
# the directive.yaml declaration.

# SUBAGENT_ISOLATION — shared | isolated.
#   shared (default) lets the commit-time orchestrator batch this section with
#   other shared attestations into ONE sub-agent (cheapest). isolated forces a
#   separate fresh-context sub-agent — use when inter-attestation independence
#   (no halo effect across verdicts) matters for this directive.
SUBAGENT_ISOLATION=shared

# SUBAGENT_TIERS_ATTEST — low | high.
#   The model capability tier the COMMIT-time attestation runs at. Default low:
#   the attest pass is a bounded read-and-record audit whose verdict the
#   merge-time sweep lane independently re-derives, so the cheap model belongs
#   here (issue #321). Raise to high for a directive whose author-time verdict
#   you want to trust more, at a higher per-commit cost.
SUBAGENT_TIERS_ATTEST=low

# SUBAGENT_TIERS_SWEEP — low | high.
#   The model capability tier the MERGE-time sweep lane runs at when it
#   re-derives this directive's verdict. Default high: the sweep is the
#   expensive verification pass. Lower it to save spend if you accept a weaker
#   re-derivation.
SUBAGENT_TIERS_SWEEP=high
