# Default model → per-MTok USD rate card for agent-token-accounting.
#
# Pack-owned and live — `governance pack update` REFRESHES this file. Do not
# hand-edit it for a one-off; per-repo price changes go in the user overlay at
# `.governance/conf/governance-kit/audit/agent-token-accounting.conf` (same row
# format), which survives `pack update`. The overlay MERGES OVER this file: a
# row there adds a model or corrects a price without editing this file. Every
# non-comment overlay line MUST start with `rate` — a malformed row fails the
# commit rather than mispricing it.
#
# Example overlay rows (these live in your overlay, not here):
#   # A brand-new model not in the default rate card:
#   rate my-org-llm-v1 3.00 3.75 0.30 15.00
#   # Negotiated/discounted pricing for an existing model (overrides the default):
#   rate claude-sonnet-4-6 2.40 3.00 0.24 12.00
#
# Each row is:
#
#   rate <model> <base_input> <cache_create> <cache_read> <output>
#
# All four prices are per-million-tokens (MTok), in USD, split by usage mode
# (base_input, cache_create_5m, cache_read, output). Cache writes assume the
# 5-minute TTL (Claude Code's default). Blank lines and `#` comments are
# ignored; every other line MUST start with `rate` — a malformed row raises and
# blocks the commit rather than silently mispricing it.
#
# Model lookup (in rates.py) is tolerant: lowercase + strip whitespace, strip a
# trailing date suffix like `-20250929`, exact match first, then longest-prefix
# match — so `claude-sonnet-4-5-custom` resolves to `claude-sonnet-4-5`.
#
# Source: Anthropic pricing table (Opus 4.x / Sonnet 3.7-4.6 / Haiku 4.x /
# Fable 5) and OpenAI API pricing table (GPT-5.4 family) as of 2026-04-23.

# ── Claude family fallbacks ────────────────────────────────────────────
# Seeded from the current production rate card. A new minor release lands on
# these rates until a version-specific row is added. Kept deliberately coarse —
# shorter than any version key so longest-prefix matching picks a specific
# version whenever one exists.
rate claude-opus    5.00  6.25  0.50  25.00
rate claude-sonnet  3.00  3.75  0.30  15.00
rate claude-haiku   1.00  1.25  0.10   5.00
rate claude-fable  10.00 12.50  1.00  50.00

# ── Claude Fable — version-specific rows ───────────────────────────────
rate claude-fable-5 10.00 12.50 1.00 50.00

# ── Claude Opus — version-specific rows ────────────────────────────────
rate claude-opus-4-7  5.00  6.25  0.50  25.00
rate claude-opus-4-6  5.00  6.25  0.50  25.00
rate claude-opus-4-5  5.00  6.25  0.50  25.00
rate claude-opus-4-1 15.00 18.75  1.50  75.00
rate claude-opus-4-0 15.00 18.75  1.50  75.00

# ── Claude Sonnet — version-specific rows ──────────────────────────────
rate claude-sonnet-4-6 3.00 3.75 0.30 15.00
rate claude-sonnet-4-5 3.00 3.75 0.30 15.00
rate claude-sonnet-4-0 3.00 3.75 0.30 15.00
rate claude-sonnet-3-7 3.00 3.75 0.30 15.00

# ── OpenAI GPT-5 family ────────────────────────────────────────────────
# `gpt-5` is the family fallback for future `gpt-5.x` releases. Specific
# variants override — `gpt-5.4-mini`/`-nano` and `gpt-5.5` win by length.
rate gpt-5         2.50 2.50 0.25  15.00
rate gpt-5.4       2.50 2.50 0.25  15.00
rate gpt-5.4-mini  0.75 0.75 0.075  4.50
rate gpt-5.4-nano  0.20 0.20 0.02   1.25
rate gpt-5.5       5.00 5.00 0.50  30.00
