# Default protected-config patterns for toolchain-config-protection.
# Pack-owned and live — `governance pack update` refreshes this file, so
# improved defaults reach every consumer. Do not hand-edit it; customize
# per-repo via the overlay at
# `.governance/conf/governance-kit/audit/toolchain-config-protection.conf`:
#
#   <pattern>     a bare line ADDS a protected pattern
#   !<pattern>    stops protecting one of the defaults below (gitignore-style
#                 negation)
#
# Matching: a trailing `/` means directory prefix, a pattern containing `/` is
# matched against the full path, otherwise it matches the basename. Irrelevant
# patterns simply never match, so a Python-only repo pays nothing for the
# JavaScript entries.
#
# Example overlay lines (these live in your overlay, not here):
#   config/ci/*.yml      # also protect your custom CI fragments
#   .npmrc               # also protect the npm config
#   !Makefile            # stop requiring a waiver for Makefile edits
.github/workflows/
.githooks/
.eslintrc
.eslintrc.*
eslint.config.*
biome.json
biome.jsonc
