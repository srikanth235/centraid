# Default integrity rules for doc-integrity. Pack-owned and live —
# `governance pack update` refreshes this file, so improved defaults reach every
# consumer. Do not hand-edit it; customize per-repo via the overlay at
# `.governance/conf/governance-kit/audit/doc-integrity.conf`:
#
#   <mode> <path> [arg]      a bare line ADDS a rule
#   !<mode> <path> [arg]     drops one of the defaults below (must match it
#                            exactly, whitespace-normalized)
#
# Each rule is `<mode> <path> [arg]`. Every rule is a no-op until the named
# document exists on the default branch, so an unused default costs nothing.
#
# Rule modes:
#   frozen-files    <glob>            files matching <glob> are byte-immutable;
#                                     new files may still be added.
#   append-only     <file>           the baseline version must stay a byte-prefix
#                                     of the current version (only appends).
#   frozen-section  <file> <heading>  baseline lines under `## <heading>` must
#                                     survive verbatim; the rest of the file is
#                                     free.
#
# Integrity is measured against the change set's baseline (the default-branch
# merge-base). For a reviewed rewrite, put a
# `governance: allow-doc-integrity <path> <reason>` line in the commit body.
#
# Example overlay lines (these live in your overlay, not here):
#   append-only   docs/DECISIONS.md    # treat your decision log as append-only
#   !frozen-files COSTS.md             # stop sealing the legacy COSTS.md ledger

# Per-issue audit traces — a past receipt is evidence of what was true then.
# Accounting rows now live in receipts under `## Accounting` (issue #201), so
# this one rule covers all go-forward accounting history.
frozen-files    receipts/*.md

# Legacy accounting ledgers — sealed history. Accounting moved into receipts
# (issue #201); these files stop receiving rows and are frozen in place so the
# historical record can't be rewritten or deleted. No-op until the file exists
# on the default branch, so fresh repos (which never had them) pay nothing.
frozen-files    COSTS.md
frozen-files    STEERING.md

# Resolved issues are historical fact; the Open worklist stays free.
frozen-section  QUALITY.md         Resolved

# Constitutional amendments: "append, do not rewrite history."
frozen-section  CONSTITUTION.md    Evolution Log
