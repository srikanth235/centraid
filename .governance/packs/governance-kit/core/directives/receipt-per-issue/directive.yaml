# receipt-per-issue — receipts bind 1:1 to a GitHub issue, carry four required sections, and the Checklist crosswalks to evidence.
category: AgentDiscipline
recommended: true
summary: Every tracked receipts/*.md has a unique issue-<N> filename token, includes ## Checklist, ## What changed, ## Out of scope, ## Verification, and each `- [x]` item appears (case-insensitive substring) in What changed or Verification.
surface: repo-state
hook: pre-commit
