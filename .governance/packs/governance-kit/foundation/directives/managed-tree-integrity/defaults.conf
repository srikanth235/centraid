# managed-tree-integrity — pack-owned defaults.
#
# This directive takes no scalar knobs. Its only configurable input is a list
# of WAIVED UNITS: managed-tree units to exempt from digest verification, one
# per line, added in the user overlay
# `.governance/conf/<owner>/<pack>/managed-tree-integrity.conf`.
#
# A unit is either:
#   * a pack/directive id   — e.g.  acme/widgets/no-foo
#   * a kit-runtime relpath — e.g.  .governance/lib.sh
#
# Waive only a unit you are mid-migration on; the real fix for drift is to
# re-run the owning verb (`governance pack update` / `governance update`) so the
# recorded digest matches the tree again. There are no default waivers.
