# Default thresholds for repo-hygiene. Pack-owned and live — `governance pack
# update` refreshes this file, so a tuned default reaches every consumer. Do not
# hand-edit it; customize per-repo via the overlay at
# `.governance/conf/governance-kit/foundation/repo-hygiene.conf` (set a
# `KEY=value` line there, or the matching `GOVERNANCE_<KEY>` env var, which
# wins). The value below *is* the default — there is no separate code constant.

# Largest committed file allowed, in MB (no-large-files sub-check).
MAX_FILE_SIZE_MB=5

# Longest source file allowed, in lines (file-size-limit sub-check).
FILE_SIZE_LIMIT=500
