# Default thresholds for required-docs. Pack-owned and live — `governance pack
# update` refreshes this file, so a tuned default reaches every consumer. Do not
# hand-edit it; customize per-repo via the overlay at
# `.governance/conf/governance-kit/foundation/required-docs.conf` (set a
# `KEY=value` line there, or the matching `GOVERNANCE_<KEY>` env var, which
# wins). The value below *is* the default — there is no separate code constant.

# Minimum line count for AGENTS.md (stub guard).
AGENTS_MD_MIN=30

# Maximum line count for AGENTS.md (keep it an index, not a manual).
AGENTS_MD_MAX=250

# Minimum internal links AGENTS.md must carry.
AGENTS_MD_MIN_LINKS=3

# Minimum line count for ARCHITECTURE.md (stub guard).
ARCHITECTURE_MIN=20
