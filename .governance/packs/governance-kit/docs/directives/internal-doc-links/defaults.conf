# Defaults for internal-doc-links. Pack-owned and live — `governance pack
# update` refreshes this file. Do not hand-edit it; customize per-repo via the
# overlay at `.governance/conf/governance-kit/docs/internal-doc-links.conf`.
#
# This file is intentionally ALL COMMENTS — internal-doc-links has no default
# rules. The `resolve` sub-check (no dead links) is always on and needs no
# config. The `reachable` sub-check (no orphan docs) is OPT-IN: it is a no-op
# until the overlay names at least one root, since "every doc must be linked" is
# a policy only some repos want. Shipping a default root would force it on every
# consumer, so the default list is empty.
#
# Overlay rules (one per line; blank lines and `#` comments ignored):
#   root <path>      An entry-point doc. Every tracked .md/.markdown file must be
#                    reachable by following internal links from at least one
#                    root. Declare one or more to turn `reachable` on.
#   exclude <glob>   A tracked doc allowed to be unreachable (matched as a shell
#                    glob against the repo-relative path). Repeatable.
#
# A doc can also opt out inline with a comment in its first 10 lines:
#   governance: allow-internal-doc-links reachable <reason>
#
# Example overlay lines (these live in your overlay, not here):
#   root AGENTS.md
#   root README.md
#   exclude docs/archive/*.md
