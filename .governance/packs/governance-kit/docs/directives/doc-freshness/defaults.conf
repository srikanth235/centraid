# Defaults for doc-freshness. Pack-owned and live — `governance pack update`
# refreshes this file. Do not hand-edit it; customize per-repo via the overlay
# at `.governance/conf/governance-kit/docs/doc-freshness.conf`.
#
# doc-freshness is OPT-IN: it checks that each path you list in the overlay
# carries a recent `<!-- last-verified: YYYY-MM-DD -->` marker. The default list
# below is empty (a bare path is a rule, and shipping one would force freshness
# tracking on every consumer), so the directive is a no-op until the overlay
# names at least one path. List one path per line in the overlay, relative to
# the repo root. A doc can opt out for one commit with a
# `governance: allow-doc-freshness <reason>` comment.
#
# Example overlay lines (these live in your overlay, not here):
#   ops/runbooks/incident-response.md
#   services/api/README.md
#   docs/data-dictionary.md

# Staleness window, in days. A tracked doc older than this many days since its
# last-verified marker fails. Override per-repo with a `FRESHNESS_DAYS=` line in
# the overlay, or the GOVERNANCE_FRESHNESS_DAYS env var (which wins).
FRESHNESS_DAYS=90
