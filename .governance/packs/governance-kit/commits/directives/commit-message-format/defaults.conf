# Default allowed Conventional-Commit types for commit-message-format.
# Pack-owned and live — `governance pack update` refreshes this file, so
# improved defaults reach every consumer. Do not hand-edit it; customize
# per-repo via the overlay at
# `.governance/conf/governance-kit/commits/commit-message-format.conf`:
#
#   <type>     a bare line ADDS an allowed Conventional-Commit type
#   !<type>    removes one of the default types below (gitignore-style negation)
#
# Example overlay lines (these live in your overlay, not here):
#   wip          # also allow `wip:` commits
#   hotfix       # also allow `hotfix:` commits
#   !style       # disallow `style:` commits
feat
fix
chore
docs
refactor
test
perf
build
ci
revert
style
