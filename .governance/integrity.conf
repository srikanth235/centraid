# .governance/integrity.conf
#
# Declares which system-of-record documents the `doc-integrity` directive
# protects. One rule per line; blank lines and lines starting with '#' are
# ignored. If this file is missing or empty, the directive is a no-op — repos
# opt documents in explicitly.
#
# Integrity is measured against the change set's baseline (the default-branch
# merge-base): content authored within the current branch stays editable until
# it merges, and only what is already on the default branch is frozen.
#
# Rules are `<mode> <path> [arg]`:
#
#   frozen-files    <glob>            Every file matching <glob> that exists at
#                                     the baseline is byte-immutable (no modify /
#                                     rename / delete); new files may be added.
#   append-only     <file>           The baseline version of <file> must be an
#                                     exact byte-prefix of the current version —
#                                     only appended content is allowed.
#   frozen-section  <file> <heading>  Every line under `## <heading>` (any level)
#                                     present at the baseline must still appear
#                                     verbatim under that heading. The rest of the
#                                     file is free; reordering/inserting is fine.
#
# Path-scoped waiver for a reviewed rewrite: put
#   governance: allow-doc-integrity <path> <reason>
# in the commit body (reason required).
#
# All standard rules are enabled by default below. Each is a no-op until the
# named document exists on the default branch, so an unused rule costs nothing —
# delete or comment a line to opt a document out, or amend a path to match your
# layout.

# Per-issue audit traces — a past receipt is evidence of what was true then.
frozen-files    receipts/*.md

# Agent accounting ledgers — only ever grow at the bottom.
append-only     COSTS.md
append-only     STEERING.md

# Resolved issues are historical fact; the Open worklist stays free.
frozen-section  QUALITY.md         Resolved

# Constitutional amendments: "append, do not rewrite history."
frozen-section  CONSTITUTION.md    Evolution Log
